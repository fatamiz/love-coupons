<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🤔 Would You Rather</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700;900&family=Mitr:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Kanit',sans-serif;background:linear-gradient(135deg,#ffe0f0 0%,#e8d5ff 30%,#d0f0ff 60%,#ffd6e0 100%);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:30px 20px 40px;overflow-x:hidden;}
body::before{content:'🤔 ⚡ 💕 🌟 💖 ✨ 🔥 💗';position:fixed;top:-20px;left:0;width:100%;font-size:22px;letter-spacing:35px;animation:floatDown 14s linear infinite;opacity:0.2;z-index:0;white-space:nowrap;pointer-events:none;}
@keyframes floatDown{0%{transform:translateY(-30px)}100%{transform:translateY(110vh)}}
.title-area{text-align:center;margin-bottom:24px;position:relative;z-index:1;}
.title-area h1{font-size:clamp(1.8rem,7vw,2.8rem);font-weight:900;background:linear-gradient(135deg,#4cc9f0,#c77dff,#ff6b9d);background-size:300% 300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:gradientShift 4s ease infinite;}
@keyframes gradientShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.subtitle{font-size:0.95rem;color:#4cc9f0;margin-top:6px;font-family:'Mitr',sans-serif;}
.box{width:100%;max-width:480px;position:relative;z-index:1;}
.question-card{background:white;border-radius:24px;padding:26px 22px;margin-bottom:18px;box-shadow:0 12px 40px rgba(76,201,240,0.2),0 0 0 3px white;border:3px solid transparent;background-clip:padding-box;position:relative;animation:cardFloat 3s ease-in-out infinite;}
@keyframes cardFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.q-label{font-size:0.7rem;font-family:'Mitr',sans-serif;letter-spacing:3px;color:#aaa;text-align:center;margin-bottom:14px;text-transform:uppercase;}
.q-text{font-size:clamp(0.95rem,3.5vw,1.2rem);font-weight:700;color:#555;text-align:center;line-height:1.5;font-family:'Mitr',sans-serif;}
.vs-divider{text-align:center;font-size:1.4rem;font-weight:900;color:#ddd;margin:16px 0;}
.choice-btn{width:100%;padding:18px 16px;border-radius:18px;border:3px solid;font-family:'Kanit',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:all 0.22s;text-align:center;line-height:1.3;position:relative;overflow:hidden;margin-bottom:12px;}
.choice-a{background:#eafaff;color:#4cc9f0;border-color:#a8e6ff;}
.choice-a:hover{background:#4cc9f0;color:white;border-color:#4cc9f0;transform:translateY(-2px);}
.choice-a.selected{background:#4cc9f0;color:white;border-color:#4cc9f0;}
.choice-b{background:#f5eeff;color:#c77dff;border-color:#ddb3ff;}
.choice-b:hover{background:#c77dff;color:white;border-color:#c77dff;transform:translateY(-2px);}
.choice-b.selected{background:#c77dff;color:white;border-color:#c77dff;}
.result-card{display:none;background:white;border-radius:20px;padding:22px;margin-bottom:16px;box-shadow:0 8px 30px rgba(0,0,0,0.08);text-align:center;}
.result-match{font-size:2.5rem;margin-bottom:8px;}
.result-text{font-size:1.1rem;font-weight:700;color:#333;}
.result-sub{font-size:0.85rem;color:#aaa;font-family:'Mitr',sans-serif;margin-top:4px;white-space:pre-line;}
.waiting-card{display:none;background:white;border-radius:20px;padding:22px;margin-bottom:16px;box-shadow:0 8px 30px rgba(0,0,0,0.08);text-align:center;}
.waiting-text{font-size:1rem;color:#aaa;font-family:'Mitr',sans-serif;}
.btn-next{width:100%;padding:17px;border:none;border-radius:18px;font-family:'Kanit',sans-serif;font-size:1.2rem;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#4cc9f0,#c77dff);color:white;box-shadow:0 10px 30px rgba(76,201,240,0.35);transition:all 0.2s;margin-bottom:10px;}
.btn-next:hover{transform:translateY(-3px);}
.btn-secondary{width:100%;padding:14px;border:2.5px solid #4cc9f0;border-radius:18px;font-family:'Kanit',sans-serif;font-size:1rem;font-weight:600;cursor:pointer;background:white;color:#4cc9f0;transition:all 0.2s;margin-bottom:10px;}
.btn-secondary:hover{background:#eafaff;transform:translateY(-2px);}
.btn-back{width:100%;padding:13px;border:none;border-radius:18px;font-family:'Kanit',sans-serif;font-size:1rem;font-weight:600;cursor:pointer;background:rgba(255,255,255,0.7);color:#aaa;margin-top:4px;transition:all 0.2s;}
.btn-back:hover{background:rgba(255,255,255,0.9);}
.idle-card{background:white;border-radius:24px;padding:40px 22px;margin-bottom:18px;box-shadow:0 12px 40px rgba(76,201,240,0.2);text-align:center;}
.idle-emoji{font-size:4rem;display:block;margin-bottom:12px;}
.idle-text{font-size:1.1rem;color:#ccc;font-family:'Mitr',sans-serif;}
.progress{font-size:0.8rem;font-family:'Mitr',sans-serif;color:#bbb;text-align:center;margin-bottom:14px;}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:#333;color:white;padding:12px 24px;border-radius:30px;font-family:'Mitr',sans-serif;font-size:0.9rem;opacity:0;transition:all 0.3s;z-index:200;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.confetti-container{position:fixed;inset:0;pointer-events:none;z-index:100;overflow:hidden;}
.confetti-piece{position:absolute;animation:confettiFall 1.5s ease-in forwards;}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>
<div class="confetti-container" id="confetti"></div>
<div class="toast" id="toast"></div>
<div class="title-area">
  <h1>🤔 Would You Rather</h1>
  <p class="subtitle">เลือกข้างหนึ่ง แล้วดูว่าแฟนคิดเหมือนกันไหม ⚡</p>
</div>
<div class="box" id="mainBox">
  <div class="idle-card" id="idleCard">
    <span class="idle-emoji">🤔</span>
    <p class="idle-text">กด "คำถามต่อไป" เพื่อเริ่มเล่น!</p>
  </div>
  <div class="question-card" id="questionCard" style="display:none">
    <div class="q-label">⚡ Would You Rather...</div>
    <div class="q-text" id="questionText"></div>
    <div class="vs-divider">— VS —</div>
    <button class="choice-btn choice-a" id="btnA" onclick="choose('a')"></button>
    <button class="choice-btn choice-b" id="btnB" onclick="choose('b')"></button>
  </div>
  <div class="waiting-card" id="waitingCard">
    <p class="waiting-text">✅ เลือกแล้ว! ส่ง Link ให้แฟนเลือกด้วย<br>แล้วกด "เปิดเฉลย" พร้อมกัน</p>
  </div>
  <div class="result-card" id="resultCard">
    <div class="result-match" id="resultEmoji"></div>
    <div class="result-text" id="resultText"></div>
    <div class="result-sub" id="resultSub"></div>
  </div>
  <div class="progress" id="progressText"></div>
  <button class="btn-next" id="btnNext" onclick="nextQuestion()">▶ คำถามต่อไป</button>
  <button class="btn-secondary" id="btnReveal" onclick="revealResult()" style="display:none">🎉 เปิดเฉลย!</button>
  <button class="btn-secondary" onclick="shareLink()">📤 Share ให้แฟน</button>
  <button class="btn-back" onclick="location.href='index.html'">← หน้าหลัก</button>
</div>
<script>
const questions=[
  {q:'ถ้าต้องเลือก...',a:'ไปเที่ยวทะเล 🏖️',b:'ไปเที่ยวภูเขา 🏔️'},
  {q:'อยากได้รับมากกว่า...',a:'กอดนานๆ ทุกวัน 🫂',b:'Kiss ทุกเช้า 😘'},
  {q:'ถ้าต้องกินทุกวัน...',a:'ชาบู 🍲',b:'บาร์บีคิว 🔥'},
  {q:'date night ในฝัน...',a:'ดูหนังที่บ้านสองคน 🎬',b:'ออกไปกินข้าวร้านหรู 🍽️'},
  {q:'ถ้าต้องเลือกสัตว์เลี้ยงด้วยกัน...',a:'หมา 🐶',b:'แมว 🐱'},
  {q:'วันหยุดสุดชิลล์...',a:'นอนอยู่บ้านทั้งวัน 🛋️',b:'ออกไปเดินเล่นข้างนอก 🌳'},
  {q:'ถ้าต้องฉลองวันเกิดกัน...',a:'ปาร์ตี้สนุกๆ กับเพื่อน 🎉',b:'romantic dinner สองคน 🕯️'},
  {q:'ชอบรับของขวัญแบบ...',a:'ของขวัญเซอร์ไพรส์ 🎁',b:'เลือกซื้อเองได้เลย 🛍️'},
  {q:'ถ้าต้องเลือก...',a:'ฝนตก ฟ้าหลัว อยู่ด้วยกัน 🌧️',b:'ดาวเต็มท้องฟ้า นอนดูด้วยกัน ⭐'},
  {q:'อยากให้คู่รักเป็น...',a:'ช่างฝัน อารมณ์ดี 🌈',b:'ดูแลจริงจัง เชื่อถือได้ 💪'},
  {q:'ถ้าต้องเดินทางด้วยกัน...',a:'รถไฟ ดูวิว ชิลล์ 🚂',b:'เครื่องบิน เร็ว สะดวก ✈️'},
  {q:'ขนมที่อยากกินด้วยกัน...',a:'ไอศกรีม 🍦',b:'ช็อกโกแลต 🍫'},
  {q:'ถ้าต้องเลือกระหว่าง...',a:'รวย แต่อยู่ไกลกัน 💰',b:'พอกิน แต่อยู่ด้วยกัน ❤️'},
  {q:'เสียงที่อยากได้ยินมากกว่า...',a:'"ฉันรักนาย" ทุกวัน 💕',b:'"ฉันภูมิใจในตัวนาย" 🥹'},
  {q:'วันเกิด อยากทำอะไร...',a:'ท่องเที่ยวต่างประเทศ 🌍',b:'ทริปในประเทศ แต่พิเศษมาก 🗺️'},
  {q:'ดูด้วยกัน...',a:'ซีรีย์ยาว 20 ตอน 📺',b:'หนังสั้น 2 ชั่วโมงจบ 🎞️'},
  {q:'อยากเก่งด้วยกัน...',a:'ทำอาหาร 🍳',b:'เต้น 💃'},
  {q:'แบบไหนโรแมนติกกว่า...',a:'จดหมายรัก handwritten 💌',b:'เพลงที่แต่งให้โดยเฉพาะ 🎵'},
  {q:'ถ้าย้อนเวลาได้...',a:'เจอกันเร็วกว่านี้ ⏰',b:'เจอตอนนี้ดีที่สุดแล้ว 💖'},
  {q:'ความฝันที่อยากทำด้วยกัน...',a:'มีบ้านหลังเล็กๆ ของตัวเอง 🏡',b:'เดินทางรอบโลกด้วยกัน 🌏'},
];
let currentIdx=null;
let myChoice=null;
let revealed=false;
let usedIndexes=[];

function nextQuestion(){
  const available=questions.map((_,i)=>i).filter(i=>!usedIndexes.includes(i));
  if(available.length===0){usedIndexes=[];return nextQuestion();}
  const idx=available[Math.floor(Math.random()*available.length)];
  usedIndexes.push(idx);
  currentIdx=idx;
  myChoice=null;
  revealed=false;
  location.hash='q-'+idx;
  loadQuestion(idx);
}

function loadQuestion(idx){
  const q=questions[idx];
  document.getElementById('idleCard').style.display='none';
  document.getElementById('questionCard').style.display='block';
  document.getElementById('waitingCard').style.display='none';
  document.getElementById('resultCard').style.display='none';
  document.getElementById('questionText').textContent=q.q;
  const btnA=document.getElementById('btnA');
  const btnB=document.getElementById('btnB');
  btnA.textContent=q.a;btnA.className='choice-btn choice-a';btnA.disabled=false;
  btnB.textContent=q.b;btnB.className='choice-btn choice-b';btnB.disabled=false;
  document.getElementById('btnReveal').style.display='none';
  document.getElementById('btnNext').style.display='block';
  document.getElementById('progressText').textContent='คำถาม '+usedIndexes.length+' / '+questions.length;
}

function choose(choice){
  if(revealed)return;
  myChoice=choice;
  const btnA=document.getElementById('btnA');
  const btnB=document.getElementById('btnB');
  if(choice==='a'){btnA.className='choice-btn choice-a selected';btnB.className='choice-btn choice-b';btnB.disabled=true;}
  else{btnB.className='choice-btn choice-b selected';btnA.className='choice-btn choice-a';btnA.disabled=true;}
  document.getElementById('waitingCard').style.display='block';
  document.getElementById('btnReveal').style.display='block';
}

function revealResult(){
  if(myChoice===null){showToast('เลือกก่อนนะ! 🤔');return;}
  revealed=true;
  const partnerChoice=new URLSearchParams(location.search).get('p');
  const q=questions[currentIdx];
  const myText=myChoice==='a'?q.a:q.b;
  const resultCard=document.getElementById('resultCard');
  resultCard.style.display='block';
  document.getElementById('waitingCard').style.display='none';
  document.getElementById('btnReveal').style.display='none';
  if(partnerChoice&&partnerChoice!==myChoice){
    document.getElementById('resultEmoji').textContent='💥';
    document.getElementById('resultText').textContent='ไม่ตรงกัน! แต่ก็น่ารักนะ 😂';
    const partnerText=partnerChoice==='a'?q.a:q.b;
    document.getElementById('resultSub').textContent='คุณ: '+myText+'\nแฟน: '+partnerText;
  } else if(partnerChoice&&partnerChoice===myChoice){
    launchConfetti();
    document.getElementById('resultEmoji').textContent='💖';
    document.getElementById('resultText').textContent='Match! คิดเหมือนกันเลย! 🥰';
    document.getElementById('resultSub').textContent='ทั้งคู่เลือก: '+myText;
  } else {
    document.getElementById('resultEmoji').textContent='✅';
    document.getElementById('resultText').textContent='คุณเลือก: '+myText;
    document.getElementById('resultSub').textContent='ส่ง link ให้แฟนเลือกด้วย แล้วดูว่าตรงกันไหม!';
  }
}

function shareLink(){
  if(currentIdx===null){showToast('เลือกคำถามก่อนนะ 🤔');return;}
  const choiceParam=myChoice?'&p='+myChoice:'';
  const url=location.origin+location.pathname+'?q='+currentIdx+choiceParam;
  if(navigator.share){navigator.share({title:'Would You Rather 🤔',text:'มาเล่น Would You Rather ด้วยกัน!',url});}
  else{navigator.clipboard.writeText(url).then(()=>showToast('คัดลอก link แล้ว! ส่งให้แฟนได้เลย 💕')).catch(()=>showToast('Copy: '+url));}
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function launchConfetti(){
  const container=document.getElementById('confetti');
  const colors=['#ff6b9d','#c77dff','#4cc9f0','#ffd60a','#06d6a0'];
  container.innerHTML='';
  for(let i=0;i<60;i++){
    const p=document.createElement('div');p.className='confetti-piece';
    p.style.cssText=`left:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1+Math.random()*1.5}s;animation-delay:${Math.random()*.3}s;`;
    container.appendChild(p);
  }
  setTimeout(()=>container.innerHTML='',3000);
}

// load from query params (?q=idx&p=choice)
const params=new URLSearchParams(location.search);
const qParam=params.get('q');
const partnerChoice=params.get('p');
if(qParam!==null){
  const idx=parseInt(qParam);
  if(!isNaN(idx)&&idx>=0&&idx<questions.length){
    currentIdx=idx;
    usedIndexes=[idx];
    loadQuestion(idx);
    if(partnerChoice){
      const info=document.getElementById('waitingCard');
      info.style.display='block';
      info.innerHTML='<p class="waiting-text">แฟนเลือกแล้ว! 🤫<br>ลองเลือกของคุณก่อน แล้วค่อยกด <strong>เปิดเฉลย</strong> พร้อมกัน</p>';
    }
  }
}
</script>
</body>
</html>
