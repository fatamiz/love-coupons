<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🤔 Would You Rather</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700;900&family=Mitr:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Kanit',sans-serif;background:linear-gradient(135deg,#ffe0f0 0%,#e8d5ff 30%,#d0f0ff 60%,#ffd6e0 100%);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:30px 20px 40px;overflow-x:hidden;}
body::before{content:'🤔 ⚡ 💕 🌟 💖 ✨ 🔥 💗';position:fixed;top:-20px;left:0;width:100%;font-size:22px;letter-spacing:35px;animation:floatDown 14s linear infinite;opacity:0.2;z-index:0;white-space:nowrap;pointer-events:none;}
@keyframes floatDown{0%{transform:translateY(-30px)}100%{transform:translateY(110vh)}}
.title-area{text-align:center;margin-bottom:20px;position:relative;z-index:1;}
.title-area h1{font-size:clamp(1.8rem,7vw,2.8rem);font-weight:900;background:linear-gradient(135deg,#4cc9f0,#c77dff,#ff6b9d);background-size:300% 300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:gradientShift 4s ease infinite;}
@keyframes gradientShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.subtitle{font-size:0.95rem;color:#4cc9f0;margin-top:6px;font-family:'Mitr',sans-serif;}
.box{width:100%;max-width:480px;position:relative;z-index:1;}

/* Progress */
.progress-wrap{margin-bottom:14px;}
.progress-bar-bg{background:rgba(255,255,255,0.6);border-radius:10px;height:8px;overflow:hidden;}
.progress-bar{background:linear-gradient(90deg,#4cc9f0,#c77dff);height:100%;border-radius:10px;transition:width 0.4s ease;}
.progress-label{font-size:0.8rem;font-family:'Mitr',sans-serif;color:#aaa;text-align:right;margin-top:5px;}

/* Partner banner */
.partner-banner{background:linear-gradient(135deg,#f5eeff,#eafaff);border:2px solid #c77dff;border-radius:16px;padding:14px 18px;margin-bottom:14px;text-align:center;font-family:'Mitr',sans-serif;font-size:0.9rem;color:#c77dff;line-height:1.5;}
.partner-banner strong{color:#ff6b9d;}

/* Question card */
.question-card{background:white;border-radius:24px;padding:24px 22px;margin-bottom:16px;box-shadow:0 12px 40px rgba(76,201,240,0.2),0 0 0 3px white;animation:cardFloat 3s ease-in-out infinite;}
@keyframes cardFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.q-label{font-size:0.7rem;font-family:'Mitr',sans-serif;letter-spacing:3px;color:#aaa;text-align:center;margin-bottom:12px;text-transform:uppercase;}
.q-text{font-size:clamp(0.95rem,3.5vw,1.15rem);font-weight:700;color:#555;text-align:center;line-height:1.5;font-family:'Mitr',sans-serif;}
.vs-divider{text-align:center;font-size:1.2rem;font-weight:900;color:#ddd;margin:14px 0;}

.choice-btn{width:100%;padding:18px 16px;border-radius:18px;border:3px solid;font-family:'Kanit',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:all 0.22s;text-align:center;line-height:1.3;position:relative;overflow:hidden;margin-bottom:10px;}
.choice-a{background:#eafaff;color:#4cc9f0;border-color:#a8e6ff;}
.choice-a:hover{background:#4cc9f0;color:white;border-color:#4cc9f0;transform:translateY(-2px);}
.choice-a.selected{background:#4cc9f0;color:white;border-color:#4cc9f0;}
.choice-b{background:#f5eeff;color:#c77dff;border-color:#ddb3ff;}
.choice-b:hover{background:#c77dff;color:white;border-color:#c77dff;transform:translateY(-2px);}
.choice-b.selected{background:#c77dff;color:white;border-color:#c77dff;}
.choice-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none!important;}

/* Share screen (after A finishes) */
.share-screen{background:white;border-radius:24px;padding:30px 22px;text-align:center;box-shadow:0 12px 40px rgba(76,201,240,0.15);}
.share-emoji{font-size:3.5rem;margin-bottom:12px;}
.share-title{font-size:1.2rem;font-weight:900;color:#333;margin-bottom:6px;}
.share-desc{font-size:0.88rem;font-family:'Mitr',sans-serif;color:#aaa;line-height:1.5;margin-bottom:18px;}

/* Comparison result */
.compare-list{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;}
.compare-item{background:white;border-radius:16px;padding:14px 16px;box-shadow:0 4px 15px rgba(0,0,0,0.06);}
.compare-item.match{border-left:4px solid #06d6a0;}
.compare-item.nomatch{border-left:4px solid #ff6b6b;}
.compare-q{font-size:0.8rem;font-family:'Mitr',sans-serif;color:#aaa;margin-bottom:6px;}
.compare-answers{display:flex;gap:8px;flex-wrap:wrap;}
.compare-badge{font-size:0.78rem;font-family:'Mitr',sans-serif;font-weight:600;padding:4px 10px;border-radius:10px;}
.badge-me{background:#eafaff;color:#4cc9f0;}
.badge-partner{background:#f5eeff;color:#c77dff;}
.badge-match{background:#edfff8;color:#06d6a0;}

/* Score card */
.score-card{background:white;border-radius:24px;padding:28px 22px;text-align:center;box-shadow:0 12px 40px rgba(76,201,240,0.15);margin-bottom:14px;}
.score-big{font-size:3.5rem;font-weight:900;background:linear-gradient(135deg,#4cc9f0,#c77dff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.score-label{font-size:0.9rem;font-family:'Mitr',sans-serif;color:#aaa;margin-top:4px;}
.score-msg{font-size:1.1rem;font-weight:700;color:#333;margin-top:14px;}
.score-sub{font-size:0.85rem;font-family:'Mitr',sans-serif;color:#aaa;margin-top:4px;}

/* Buttons */
.btn-primary{width:100%;padding:17px;border:none;border-radius:18px;font-family:'Kanit',sans-serif;font-size:1.15rem;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#4cc9f0,#c77dff);color:white;box-shadow:0 10px 30px rgba(76,201,240,0.35);transition:all 0.2s;margin-bottom:10px;}
.btn-primary:hover{transform:translateY(-3px);}
.btn-secondary{width:100%;padding:14px;border:2.5px solid #4cc9f0;border-radius:18px;font-family:'Kanit',sans-serif;font-size:1rem;font-weight:600;cursor:pointer;background:white;color:#4cc9f0;transition:all 0.2s;margin-bottom:10px;}
.btn-secondary:hover{background:#eafaff;transform:translateY(-2px);}
.btn-back{width:100%;padding:13px;border:none;border-radius:18px;font-family:'Kanit',sans-serif;font-size:1rem;font-weight:600;cursor:pointer;background:rgba(255,255,255,0.7);color:#aaa;margin-top:4px;transition:all 0.2s;}
.btn-back:hover{background:rgba(255,255,255,0.9);}

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:#333;color:white;padding:12px 24px;border-radius:30px;font-family:'Mitr',sans-serif;font-size:0.9rem;opacity:0;transition:all 0.3s;z-index:200;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.confetti-container{position:fixed;inset:0;pointer-events:none;z-index:100;overflow:hidden;}
.confetti-piece{position:absolute;animation:confettiFall 1.5s ease-in forwards;}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>
<div class="confetti-container" id="confetti"></div>
<div class="toast" id="toast"></div>
<div class="title-area">
  <h1>🤔 Would You Rather</h1>
  <p class="subtitle" id="mainSubtitle">ตอบครบแล้ว share ให้แฟน เปรียบคำตอบได้เลย! ⚡</p>
</div>
<div class="box" id="mainBox"></div>
<button class="btn-back" style="max-width:480px;position:relative;z-index:1;" onclick="location.href='index.html'">← หน้าหลัก</button>

<script>
const questions=[
  {q:'ถ้าต้องเลือก...',a:'ไปเที่ยวทะเล 🏖️',b:'ไปเที่ยวภูเขา 🏔️'},
  {q:'อยากได้รับมากกว่า...',a:'กอดนานๆ ทุกวัน 🫂',b:'Kiss ทุกเช้า 😘'},
  {q:'ถ้าต้องกินทุกวัน...',a:'ชาบู 🍲',b:'บาร์บีคิว 🔥'},
  {q:'date night ในฝัน...',a:'ดูหนังที่บ้านสองคน 🎬',b:'ออกไปกินข้าวร้านหรู 🍽️'},
  {q:'ถ้าต้องเลือกสัตว์เลี้ยงด้วยกัน...',a:'หมา 🐶',b:'แมว 🐱'},
  {q:'วันหยุดสุดชิลล์...',a:'นอนอยู่บ้านทั้งวัน 🛋️',b:'ออกไปเดินเล่นข้างนอก 🌳'},
  {q:'ถ้าต้องฉลองวันเกิดกัน...',a:'ปาร์ตี้สนุกๆ กับเพื่อน 🎉',b:'romantic dinner สองคน 🕯️'},
  {q:'ชอบรับของขวัญแบบ...',a:'ของขวัญเซอร์ไพรส์ 🎁',b:'เลือกซื้อเองได้เลย 🛍️'},
  {q:'ถ้าต้องเลือก...',a:'ฝนตก ฟ้าหลัว อยู่ด้วยกัน 🌧️',b:'ดาวเต็มท้องฟ้า นอนดูด้วยกัน ⭐'},
  {q:'ความฝันที่อยากทำด้วยกัน...',a:'มีบ้านหลังเล็กๆ ของตัวเอง 🏡',b:'เดินทางรอบโลกด้วยกัน 🌏'},
];
const TOTAL=questions.length;
const scoreMessages=[
  {min:0,max:3,msg:'ตรงกันน้อยมาก 😂',sub:'ความต่างทำให้ชีวิตน่าสนใจขึ้น!'},
  {min:4,max:6,msg:'ตรงกันพอสมควร 💫',sub:'มีทั้งเหมือนและต่าง สมดุลดีนะ!'},
  {min:7,max:8,msg:'ตรงกันเยอะมาก! 💖',sub:'เข้ากันได้ดีมากเลย~'},
  {min:9,max:10,msg:'ตรงกันแทบทุกข้อ! 🥰',sub:'คู่รักสายเดียวกันสุดๆ!'},
];

let myAnswers=[];
let partnerAnswers=null;
let currentQ=0;

// read partner answers from URL
const urlParams=new URLSearchParams(location.search);
const aParam=urlParams.get('a');
if(aParam&&aParam.length===TOTAL&&/^[ab]+$/.test(aParam)){
  partnerAnswers=aParam;
}

function render(){
  const box=document.getElementById('mainBox');
  if(currentQ<TOTAL){
    renderQuestion(box);
  } else if(!partnerAnswers){
    renderShareScreen(box);
  } else {
    renderComparison(box);
  }
}

function renderQuestion(box){
  const q=questions[currentQ];
  const pct=(currentQ/TOTAL)*100;
  box.innerHTML=`
    ${partnerAnswers?'<div class="partner-banner">💕 แฟนตอบแล้ว! ตอบของคุณเองก่อน แล้วดูว่าตรงกันไหม</div>':''}
    <div class="progress-wrap">
      <div class="progress-bar-bg"><div class="progress-bar" style="width:${pct}%"></div></div>
      <div class="progress-label">${currentQ} / ${TOTAL} ตอบแล้ว</div>
    </div>
    <div class="question-card">
      <div class="q-label">⚡ Would You Rather... (ข้อ ${currentQ+1}/${TOTAL})</div>
      <div class="q-text">${q.q}</div>
      <div class="vs-divider">— VS —</div>
      <button class="choice-btn choice-a" onclick="choose('a')">${q.a}</button>
      <button class="choice-btn choice-b" onclick="choose('b')">${q.b}</button>
    </div>`;
}

function choose(choice){
  myAnswers.push(choice);
  // brief flash animation
  const btns=document.querySelectorAll('.choice-btn');
  btns.forEach(b=>b.disabled=true);
  const picked=choice==='a'?btns[0]:btns[1];
  picked.classList.add('selected');
  setTimeout(()=>{
    currentQ++;
    render();
  },300);
}

function renderShareScreen(box){
  const link=buildShareLink();
  box.innerHTML=`
    <div class="share-screen">
      <div class="share-emoji">🎉</div>
      <div class="share-title">ตอบครบแล้ว! ส่งให้แฟนเลย</div>
      <div class="share-desc">แฟนจะเล่นคำถามเดิมทั้ง ${TOTAL} ข้อ<br>แล้วดูว่าตรงกันไหน บ้าง 💕</div>
      <button class="btn-primary" onclick="shareLink()">📤 Share ให้แฟน</button>
      <button class="btn-secondary" onclick="restart()">🔄 เริ่มใหม่</button>
    </div>`;
}

function renderComparison(box){
  const matchCount=myAnswers.filter((a,i)=>a===partnerAnswers[i]).length;
  const msg=scoreMessages.find(m=>matchCount>=m.min&&matchCount<=m.max)||scoreMessages[scoreMessages.length-1];
  if(matchCount>=7)launchConfetti();
  let items='';
  questions.forEach((q,i)=>{
    const me=myAnswers[i];
    const partner=partnerAnswers[i];
    const isMatch=me===partner;
    const meText=me==='a'?q.a:q.b;
    const partnerText=partner==='a'?q.a:q.b;
    items+=`
      <div class="compare-item ${isMatch?'match':'nomatch'}">
        <div class="compare-q">ข้อ ${i+1}: ${q.q}</div>
        <div class="compare-answers">
          ${isMatch
            ?`<span class="compare-badge badge-match">💖 Match! — ${meText}</span>`
            :`<span class="compare-badge badge-me">คุณ: ${meText}</span>
              <span class="compare-badge badge-partner">แฟน: ${partnerText}</span>`
          }
        </div>
      </div>`;
  });
  box.innerHTML=`
    <div class="score-card">
      <div class="score-big">${matchCount}/${TOTAL}</div>
      <div class="score-label">ตรงกัน</div>
      <div class="score-msg">${msg.msg}</div>
      <div class="score-sub">${msg.sub}</div>
    </div>
    <div class="compare-list">${items}</div>
    <button class="btn-primary" onclick="shareResult()">📤 Share ผลให้แฟนดูด้วย</button>
    <button class="btn-secondary" onclick="restart()">🔄 เล่นใหม่</button>`;
}

function buildShareLink(){
  return location.origin+location.pathname+'?a='+myAnswers.join('');
}

function shareLink(){
  const url=buildShareLink();
  if(navigator.share){navigator.share({title:'Would You Rather 🤔',text:'มาเล่น Would You Rather ด้วยกัน แล้วดูว่าเราตรงกันไหม!',url});}
  else{navigator.clipboard.writeText(url).then(()=>showToast('คัดลอก link แล้ว! ส่งให้แฟนได้เลย 💕')).catch(()=>prompt('Copy link นี้:',url));}
}

function shareResult(){
  const url=buildShareLink();
  if(navigator.share){navigator.share({title:'Would You Rather — ผลของเรา 💖',text:'ดูผลว่าเราตรงกันไหน!',url});}
  else{navigator.clipboard.writeText(url).then(()=>showToast('คัดลอก link แล้ว! 💕')).catch(()=>prompt('Copy link นี้:',url));}
}

function restart(){
  myAnswers=[];currentQ=0;
  history.replaceState(null,'',location.pathname);
  partnerAnswers=null;
  document.getElementById('mainSubtitle').textContent='ตอบครบแล้ว share ให้แฟน เปรียบคำตอบได้เลย! ⚡';
  render();
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function launchConfetti(){
  const container=document.getElementById('confetti');
  const colors=['#ff6b9d','#c77dff','#4cc9f0','#ffd60a','#06d6a0'];
  container.innerHTML='';
  for(let i=0;i<70;i++){
    const p=document.createElement('div');p.className='confetti-piece';
    p.style.cssText=`left:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1+Math.random()*1.5}s;animation-delay:${Math.random()*.4}s;`;
    container.appendChild(p);
  }
  setTimeout(()=>container.innerHTML='',3500);
}

render();
</script>
</body>
</html>
