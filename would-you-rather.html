<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🤔 Would You Rather</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700;900&family=Mitr:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Kanit',sans-serif;background:linear-gradient(135deg,#ffe0f0 0%,#e8d5ff 30%,#d0f0ff 60%,#ffd6e0 100%);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:28px 20px 40px;overflow-x:hidden;}
body::before{content:'🤔 ⚡ 💕 🌟 💖 ✨ 🔥 💗';position:fixed;top:-20px;left:0;width:100%;font-size:20px;letter-spacing:35px;animation:floatDown 14s linear infinite;opacity:0.18;z-index:0;white-space:nowrap;pointer-events:none;}
@keyframes floatDown{0%{transform:translateY(-30px)}100%{transform:translateY(110vh)}}
.title-area{text-align:center;margin-bottom:18px;position:relative;z-index:1;}
.title-area h1{font-size:clamp(1.8rem,7vw,2.8rem);font-weight:900;background:linear-gradient(135deg,#4cc9f0,#c77dff,#ff6b9d);background-size:300% 300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:gradientShift 4s ease infinite;}
@keyframes gradientShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.subtitle{font-size:0.9rem;color:#4cc9f0;margin-top:5px;font-family:'Mitr',sans-serif;}
.box{width:100%;max-width:480px;position:relative;z-index:1;}

/* Home / general card */
.g-card{background:white;border-radius:24px;padding:28px 22px;box-shadow:0 12px 40px rgba(76,201,240,0.15);margin-bottom:14px;text-align:center;}
.g-card-emoji{font-size:3.5rem;display:block;margin-bottom:12px;}
.g-card-title{font-size:1.25rem;font-weight:900;color:#333;margin-bottom:6px;}
.g-card-desc{font-size:0.88rem;font-family:'Mitr',sans-serif;color:#aaa;line-height:1.5;margin-bottom:18px;}

/* Room code display */
.room-code-box{background:linear-gradient(135deg,#f5eeff,#eafaff);border:2px dashed #c77dff;border-radius:16px;padding:14px;margin:14px 0;letter-spacing:8px;font-size:2rem;font-weight:900;color:#c77dff;text-align:center;}
.room-code-label{font-size:0.75rem;font-family:'Mitr',sans-serif;color:#aaa;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}

/* Code input */
.code-input{width:100%;padding:14px;border:2.5px solid #ddd;border-radius:16px;font-family:'Kanit',sans-serif;font-size:1.5rem;font-weight:700;text-align:center;letter-spacing:6px;color:#333;margin-bottom:10px;transition:border-color 0.2s;outline:none;}
.code-input:focus{border-color:#4cc9f0;}

/* Waiting dots */
.waiting-dots{display:flex;justify-content:center;gap:8px;margin-top:18px;}
.waiting-dots span{width:10px;height:10px;background:#c77dff;border-radius:50%;animation:bounce 1.2s infinite;}
.waiting-dots span:nth-child(2){animation-delay:0.2s;}
.waiting-dots span:nth-child(3){animation-delay:0.4s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-10px)}}

/* Progress */
.progress-wrap{margin-bottom:14px;}
.progress-bar-bg{background:rgba(255,255,255,0.6);border-radius:10px;height:8px;overflow:hidden;}
.progress-bar{background:linear-gradient(90deg,#4cc9f0,#c77dff);height:100%;border-radius:10px;transition:width 0.4s;}
.progress-label{font-size:0.8rem;font-family:'Mitr',sans-serif;color:#aaa;text-align:right;margin-top:4px;}

/* Question card */
.question-card{background:white;border-radius:24px;padding:24px 20px;margin-bottom:14px;box-shadow:0 12px 40px rgba(76,201,240,0.18),0 0 0 3px white;animation:cardFloat 3s ease-in-out infinite;}
@keyframes cardFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.q-label{font-size:0.68rem;font-family:'Mitr',sans-serif;letter-spacing:3px;color:#aaa;text-align:center;margin-bottom:10px;text-transform:uppercase;}
.q-text{font-size:clamp(0.95rem,3.5vw,1.15rem);font-weight:700;color:#555;text-align:center;line-height:1.5;font-family:'Mitr',sans-serif;}
.vs-divider{text-align:center;font-size:1.1rem;font-weight:900;color:#ddd;margin:12px 0;}
.choice-btn{width:100%;padding:17px 14px;border-radius:18px;border:3px solid;font-family:'Kanit',sans-serif;font-size:0.95rem;font-weight:700;cursor:pointer;transition:all 0.2s;text-align:center;line-height:1.3;margin-bottom:10px;}
.choice-a{background:#eafaff;color:#4cc9f0;border-color:#a8e6ff;}
.choice-a:hover{background:#4cc9f0;color:white;border-color:#4cc9f0;transform:translateY(-2px);}
.choice-b{background:#f5eeff;color:#c77dff;border-color:#ddb3ff;}
.choice-b:hover{background:#c77dff;color:white;border-color:#c77dff;transform:translateY(-2px);}
.choice-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none!important;}
.picked-banner{background:#edfff8;border:2px solid #06d6a0;border-radius:16px;padding:14px;text-align:center;color:#06d6a0;font-family:'Mitr',sans-serif;font-size:0.95rem;margin-bottom:10px;}
.waiting-partner{text-align:center;color:#aaa;font-family:'Mitr',sans-serif;font-size:0.9rem;animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* Result card */
.result-card{background:white;border-radius:24px;padding:26px 20px;margin-bottom:14px;box-shadow:0 12px 40px rgba(0,0,0,0.08);text-align:center;}
.result-big-emoji{font-size:3.5rem;margin-bottom:10px;}
.result-title{font-size:1.3rem;font-weight:900;color:#333;margin-bottom:16px;}
.result-choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.result-choice{background:#f9f9f9;border-radius:14px;padding:12px 10px;}
.choice-who{font-size:0.75rem;font-family:'Mitr',sans-serif;color:#aaa;margin-bottom:5px;}
.choice-val{font-size:0.85rem;font-weight:700;padding:6px 10px;border-radius:10px;}
.val-a{background:#eafaff;color:#4cc9f0;}
.val-b{background:#f5eeff;color:#c77dff;}

/* Final comparison */
.score-card{background:white;border-radius:24px;padding:26px 20px;text-align:center;box-shadow:0 12px 40px rgba(76,201,240,0.15);margin-bottom:14px;}
.score-big{font-size:3.5rem;font-weight:900;background:linear-gradient(135deg,#4cc9f0,#c77dff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.score-label{font-size:0.9rem;font-family:'Mitr',sans-serif;color:#aaa;margin-top:4px;}
.score-msg{font-size:1.1rem;font-weight:700;color:#333;margin-top:12px;}
.score-sub{font-size:0.85rem;font-family:'Mitr',sans-serif;color:#aaa;margin-top:4px;}
.compare-list{display:flex;flex-direction:column;gap:10px;margin-bottom:14px;}
.compare-item{background:white;border-radius:16px;padding:13px 15px;box-shadow:0 4px 15px rgba(0,0,0,0.06);}
.compare-item.match{border-left:4px solid #06d6a0;}
.compare-item.nomatch{border-left:4px solid #ff6b6b;}
.compare-q{font-size:0.78rem;font-family:'Mitr',sans-serif;color:#aaa;margin-bottom:5px;}
.compare-answers{display:flex;gap:7px;flex-wrap:wrap;}
.compare-badge{font-size:0.76rem;font-family:'Mitr',sans-serif;font-weight:600;padding:3px 10px;border-radius:10px;}
.badge-me{background:#eafaff;color:#4cc9f0;}
.badge-partner{background:#f5eeff;color:#c77dff;}
.badge-match{background:#edfff8;color:#06d6a0;}

/* Buttons */
.btn-primary{width:100%;padding:16px;border:none;border-radius:18px;font-family:'Kanit',sans-serif;font-size:1.1rem;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#4cc9f0,#c77dff);color:white;box-shadow:0 10px 30px rgba(76,201,240,0.35);transition:all 0.2s;margin-bottom:10px;display:block;}
.btn-primary:hover{transform:translateY(-3px);}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.btn-secondary{width:100%;padding:13px;border:2.5px solid #4cc9f0;border-radius:18px;font-family:'Kanit',sans-serif;font-size:1rem;font-weight:600;cursor:pointer;background:white;color:#4cc9f0;transition:all 0.2s;margin-bottom:10px;display:block;}
.btn-secondary:hover{background:#eafaff;transform:translateY(-2px);}
.btn-back{width:100%;max-width:480px;padding:13px;border:none;border-radius:18px;font-family:'Kanit',sans-serif;font-size:0.95rem;font-weight:600;cursor:pointer;background:rgba(255,255,255,0.7);color:#aaa;margin-top:4px;transition:all 0.2s;position:relative;z-index:1;}
.btn-back:hover{background:rgba(255,255,255,0.9);}
.or-divider{font-family:'Mitr',sans-serif;font-size:0.85rem;color:#ccc;margin:14px 0;}

/* Toast & confetti */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:#333;color:white;padding:11px 22px;border-radius:30px;font-family:'Mitr',sans-serif;font-size:0.88rem;opacity:0;transition:all 0.3s;z-index:200;pointer-events:none;white-space:nowrap;max-width:90vw;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.confetti-container{position:fixed;inset:0;pointer-events:none;z-index:100;overflow:hidden;}
.confetti-piece{position:absolute;animation:confettiFall 1.5s ease-in forwards;}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>
<div class="confetti-container" id="confetti"></div>
<div class="toast" id="toast"></div>
<div class="title-area">
  <h1>🤔 Would You Rather</h1>
  <p class="subtitle">เล่นด้วยกัน 2 เครื่อง แบบ real-time ⚡</p>
</div>
<div class="box" id="box"></div>
<button class="btn-back" onclick="goBack()">← หน้าหลัก</button>

<script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyC98_FyVY_mzW_UwJ0-xQqMqx3Qy_paSi0",
  authDomain:"love-games-a0127.firebaseapp.com",
  databaseURL:"https://love-games-a0127-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"love-games-a0127",
  storageBucket:"love-games-a0127.firebasestorage.app",
  messagingSenderId:"1078221272996",
  appId:"1:1078221272996:web:64c29179c9daa3a8837331"
});
const db = firebase.database();

const questions=[
  {q:'ถ้าต้องเลือก...',a:'ไปเที่ยวทะเล 🏖️',b:'ไปเที่ยวภูเขา 🏔️'},
  {q:'อยากได้รับมากกว่า...',a:'กอดนานๆ ทุกวัน 🫂',b:'Kiss ทุกเช้า 😘'},
  {q:'ถ้าต้องกินทุกวัน...',a:'ชาบู 🍲',b:'บาร์บีคิว 🔥'},
  {q:'date night ในฝัน...',a:'ดูหนังที่บ้านสองคน 🎬',b:'ออกไปกินข้าวร้านหรู 🍽️'},
  {q:'ถ้าต้องเลือกสัตว์เลี้ยงด้วยกัน...',a:'หมา 🐶',b:'แมว 🐱'},
  {q:'วันหยุดสุดชิลล์...',a:'นอนอยู่บ้านทั้งวัน 🛋️',b:'ออกไปเดินเล่นข้างนอก 🌳'},
  {q:'ถ้าต้องฉลองวันเกิดกัน...',a:'ปาร์ตี้สนุกๆ กับเพื่อน 🎉',b:'romantic dinner สองคน 🕯️'},
  {q:'ชอบรับของขวัญแบบ...',a:'ของขวัญเซอร์ไพรส์ 🎁',b:'เลือกซื้อเองได้เลย 🛍️'},
  {q:'ถ้าต้องเลือก...',a:'ฝนตก ฟ้าหลัว อยู่ด้วยกัน 🌧️',b:'ดาวเต็มท้องฟ้า นอนดูด้วยกัน ⭐'},
  {q:'ความฝันที่อยากทำด้วยกัน...',a:'มีบ้านหลังเล็กๆ ของตัวเอง 🏡',b:'เดินทางรอบโลกด้วยกัน 🌏'},
];
const TOTAL=questions.length;
const box=document.getElementById('box');

let roomId=null, myRole=null, roomRef=null, roomData=null, roomListener=null, advancing=false;

function genId(){
  const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({length:6},()=>c[Math.floor(Math.random()*c.length)]).join('');
}

// ── Room management ──

async function createRoom(){
  roomId=genId();
  myRole='host';
  roomRef=db.ref('wyr/'+roomId);
  await roomRef.set({q:0,players:1,host:null,guest:null,history:{}});
  history.pushState(null,'','?room='+roomId+'&r=h');
  subscribeRoom();
}

async function joinRoomByCode(){
  const val=(document.getElementById('codeInput')?.value||'').toUpperCase().replace(/[^A-Z0-9]/g,'');
  if(val.length<4){showToast('ใส่รหัสห้องให้ครบก่อนนะ 🙈');return;}
  await doJoinGuest(val);
}

async function doJoinGuest(code){
  roomId=code;
  myRole='guest';
  roomRef=db.ref('wyr/'+roomId);
  const snap=await roomRef.once('value');
  if(!snap.exists()){showToast('ไม่พบห้องนี้ ลองตรวจรหัสอีกครั้ง 🙈');return;}
  await roomRef.update({players:2});
  history.pushState(null,'','?room='+roomId);
  subscribeRoom();
}

function subscribeRoom(){
  if(roomListener&&roomRef)roomRef.off('value',roomListener);
  renderWaiting();
  roomListener=roomRef.on('value',snap=>{
    if(!snap.exists())return;
    roomData=snap.val();
    handleUpdate(roomData);
  });
}

function handleUpdate(d){
  if(!d)return;
  if(d.players<2){renderWaiting();return;}
  if(d.q>=TOTAL){renderFinal(d);return;}
  const myAns=d[myRole];
  const partnerAns=d[myRole==='host'?'guest':'host'];
  const bothAnswered=(myAns!==null&&myAns!==undefined&&partnerAns!==null&&partnerAns!==undefined);
  if(bothAnswered){renderResult(d);}
  else{renderQuestion(d);}
}

// ── Screens ──

function renderHome(){
  box.innerHTML=`
    <div class="g-card">
      <span class="g-card-emoji">🤔</span>
      <div class="g-card-title">Would You Rather</div>
      <div class="g-card-desc">เล่นด้วยกัน 2 เครื่อง แบบ real-time!<br>สร้างห้อง แล้วส่ง link ให้แฟนเข้ามา</div>
      <button class="btn-primary" onclick="createRoom()">✨ สร้างห้องใหม่</button>
      <div class="or-divider">— หรือเข้าห้องที่มีอยู่ —</div>
      <input class="code-input" id="codeInput" placeholder="รหัสห้อง 6 ตัว" maxlength="8"
        oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9]/g,'')"
        onkeydown="if(event.key==='Enter')joinRoomByCode()">
      <button class="btn-secondary" onclick="joinRoomByCode()">🚪 เข้าห้อง</button>
    </div>`;
}

function renderWaiting(){
  const shareUrl=location.origin+location.pathname.replace(/\?.*$/,'')+'?room='+roomId;
  box.innerHTML=`
    <div class="g-card">
      <span class="g-card-emoji">⏳</span>
      <div class="g-card-title">รอแฟนเข้าห้อง...</div>
      <div class="room-code-label">รหัสห้อง</div>
      <div class="room-code-box">${roomId}</div>
      <div class="g-card-desc" style="margin-bottom:16px">ส่ง link ให้แฟนเปิด หรือบอกรหัสห้องด้านบน</div>
      <button class="btn-primary" onclick="shareRoomLink()">📤 ส่ง Link ให้แฟน</button>
    </div>
    <div class="waiting-dots"><span></span><span></span><span></span></div>`;
}

function shareRoomLink(){
  const url=location.origin+location.pathname.replace(/[?#].*/,'')+'?room='+roomId;
  if(navigator.share){navigator.share({title:'Would You Rather 🤔',text:'มาเล่น Would You Rather ด้วยกัน!',url});}
  else{navigator.clipboard.writeText(url).then(()=>showToast('คัดลอก link แล้ว! ส่งให้แฟนได้เลย 💕')).catch(()=>prompt('Copy link นี้:',url));}
}

function renderQuestion(d){
  const q=questions[d.q];
  const myAns=d[myRole];
  const pct=(d.q/TOTAL)*100;
  const partnerAns=d[myRole==='host'?'guest':'host'];
  box.innerHTML=`
    <div class="progress-wrap">
      <div class="progress-bar-bg"><div class="progress-bar" style="width:${pct}%"></div></div>
      <div class="progress-label">ข้อ ${d.q+1} / ${TOTAL}</div>
    </div>
    <div class="question-card">
      <div class="q-label">⚡ WOULD YOU RATHER...</div>
      <div class="q-text">${q.q}</div>
      <div class="vs-divider">— VS —</div>
      ${myAns==null?`
        <button class="choice-btn choice-a" onclick="pick('a')">${q.a}</button>
        <button class="choice-btn choice-b" onclick="pick('b')">${q.b}</button>
      `:`
        <div class="picked-banner">✅ คุณเลือก: <strong>${myAns==='a'?q.a:q.b}</strong></div>
        <div class="waiting-partner">${partnerAns!=null?'แฟนเลือกแล้ว! กำลังแสดงผล...':'⏳ รอแฟนเลือก...'}</div>
      `}
    </div>`;
}

async function pick(choice){
  await roomRef.update({[myRole]:choice});
}

function renderResult(d){
  const q=questions[d.q];
  const myAns=d[myRole];
  const partnerAns=d[myRole==='host'?'guest':'host'];
  const isMatch=myAns===partnerAns;
  if(isMatch)launchConfetti();
  const isLast=d.q>=TOTAL-1;
  box.innerHTML=`
    <div class="result-card">
      <div class="result-big-emoji">${isMatch?'💖':'💥'}</div>
      <div class="result-title">${isMatch?'Match! คิดเหมือนกัน! 🥰':'ไม่ตรงกัน! 😂'}</div>
      <div class="result-choices">
        <div class="result-choice">
          <div class="choice-who">คุณ 👤</div>
          <div class="choice-val ${myAns==='a'?'val-a':'val-b'}">${myAns==='a'?q.a:q.b}</div>
        </div>
        <div class="result-choice">
          <div class="choice-who">แฟน 💕</div>
          <div class="choice-val ${partnerAns==='a'?'val-a':'val-b'}">${partnerAns==='a'?q.a:q.b}</div>
        </div>
      </div>
    </div>
    <button class="btn-primary" id="nextBtn" onclick="nextQ()">${isLast?'🎉 ดูผลสรุป!':'▶ ข้อต่อไป'}</button>`;
}

async function nextQ(){
  if(advancing)return;
  advancing=true;
  document.getElementById('nextBtn')?.setAttribute('disabled','');
  const d=roomData;
  if(!d){advancing=false;return;}
  await roomRef.update({
    ['history/'+d.q]:{host:d.host,guest:d.guest},
    q:d.q+1,
    host:null,
    guest:null,
  });
  advancing=false;
}

function renderFinal(d){
  const hist=d.history||{};
  let matchCount=0;
  let items='';
  questions.forEach((q,i)=>{
    const h=hist[i]||{};
    const myAns=myRole==='host'?h.host:h.guest;
    const partnerAns=myRole==='host'?h.guest:h.host;
    const isMatch=myAns&&partnerAns&&myAns===partnerAns;
    if(isMatch)matchCount++;
    const myText=myAns==='a'?q.a:myAns==='b'?q.b:'?';
    const partnerText=partnerAns==='a'?q.a:partnerAns==='b'?q.b:'?';
    items+=`
      <div class="compare-item ${isMatch?'match':'nomatch'}">
        <div class="compare-q">ข้อ ${i+1}: ${q.q}</div>
        <div class="compare-answers">
          ${isMatch
            ?`<span class="compare-badge badge-match">💖 Match! — ${myText}</span>`
            :`<span class="compare-badge badge-me">คุณ: ${myText}</span>
              <span class="compare-badge badge-partner">แฟน: ${partnerText}</span>`
          }
        </div>
      </div>`;
  });
  const msgs=[
    {min:0,max:3,msg:'ตรงกันน้อยมาก 😂',sub:'ความต่างทำให้ชีวิตน่าสนใจ!'},
    {min:4,max:6,msg:'ตรงกันพอสมควร 💫',sub:'มีทั้งเหมือนและต่าง สมดุลดี!'},
    {min:7,max:8,msg:'ตรงกันเยอะมาก! 💖',sub:'เข้ากันได้ดีมากเลย~'},
    {min:9,max:10,msg:'ตรงกันแทบทุกข้อ! 🥰',sub:'คู่รักสายเดียวกันสุดๆ!'},
  ];
  const msg=msgs.find(m=>matchCount>=m.min&&matchCount<=m.max)||msgs[msgs.length-1];
  if(matchCount>=7)setTimeout(launchConfetti,100);
  box.innerHTML=`
    <div class="score-card">
      <div class="score-big">${matchCount}/${TOTAL}</div>
      <div class="score-label">ตรงกัน</div>
      <div class="score-msg">${msg.msg}</div>
      <div class="score-sub">${msg.sub}</div>
    </div>
    <div class="compare-list">${items}</div>
    <button class="btn-primary" onclick="restartGame()">🔄 เล่นใหม่</button>`;
  setTimeout(()=>roomRef.remove(),5000);
}

async function restartGame(){
  if(!roomRef){renderHome();return;}
  advancing=false;
  await roomRef.set({q:0,players:2,host:null,guest:null,history:{}});
}

function goBack(){
  if(roomListener&&roomRef)roomRef.off('value',roomListener);
  location.href='index.html';
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function launchConfetti(){
  const c=document.getElementById('confetti');
  const colors=['#ff6b9d','#c77dff','#4cc9f0','#ffd60a','#06d6a0'];
  c.innerHTML='';
  for(let i=0;i<70;i++){
    const p=document.createElement('div');p.className='confetti-piece';
    p.style.cssText=`left:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1+Math.random()*1.5}s;animation-delay:${Math.random()*.4}s;`;
    c.appendChild(p);
  }
  setTimeout(()=>c.innerHTML='',3500);
}

// ── Init ──
const params=new URLSearchParams(location.search);
const roomParam=params.get('room');
const roleParam=params.get('r');

if(roomParam){
  roomId=roomParam.toUpperCase();
  if(roleParam==='h'){
    myRole='host';
    roomRef=db.ref('wyr/'+roomId);
    subscribeRoom();
  } else {
    doJoinGuest(roomId);
  }
} else {
  renderHome();
}
</script>
