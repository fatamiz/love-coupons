   choices:['ชมและบอกว่าภูมิใจมากแค่ไหน 🥹','พาไปกินอาหารอร่อยหรือทำอะไรพิเศษ 🍽️','ซื้อของขวัญเล็กๆ น้อยๆ 🎁','แค่อยู่เคียงข้างและ hug แน่นๆ 🫂'],
   insightTitles:['นักเชียร์มืออาชีพ 🥹','นักจัดซัปไพรส์ 🎉','นักให้ของขวัญ 🎁','นักกอด 🫂'],
   insights:['นักเชียร์ตัวยง! คำพูดทำให้แฟนรู้สึกมีคุณค่า','แสดงออกผ่านการกระทำ ทำสิ่งพิเศษ','มีความคิดสร้างสรรค์ในการให้ของขวัญ','รู้ว่าบางทีแค่อยู่ด้วยกันก็พอแล้ว'],
   insightEmojis:['🥹','🍽️','🎁','🫂']},
];
const TOTAL=questions.length;
const matchMessages=[
  {min:0,max:3,msg:'ตรงกันน้อยมาก 😂',sub:'ความต่างทำให้ชีวิตน่าสนใจขึ้น!'},
  {min:4,max:6,msg:'ตรงกันพอสมควร 💫',sub:'มีทั้งเหมือนและต่าง สมดุลดี!'},
  {min:7,max:9,msg:'เข้ากันดีมาก! 💖',sub:'มีหลายเรื่องที่คิดเหมือนกัน~'},
  {min:10,max:10,msg:'ตรงกันทุกข้อ! 🥰',sub:'คู่รักสายเดียวกันสุดๆ!'},
];

const box=document.getElementById('box');
let roomId=null,myRole=null,roomRef=null,roomListener=null,roomData=null,advancing=false;

function genId(){
  const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({length:6},()=>c[Math.floor(Math.random()*c.length)]).join('');
}

async function createRoom(){
  roomId=genId();
  myRole='host';
  roomRef=db.ref('quiz/'+roomId);
  await roomRef.set({players:1,q:0,host:null,guest:null,history:{}});
  roomRef.onDisconnect().remove();
  history.pushState(null,'','?room='+roomId+'&r=h');
  subscribeRoom();
}

async function doJoinGuest(code){
  roomId=code;
  myRole='guest';
  roomRef=db.ref('quiz/'+roomId);
  const snap=await roomRef.once('value');
  if(!snap.exists()){showToast('ไม่พบห้องนี้ 🙈');renderHome();createRoom();return;}
  await roomRef.update({players:2});
  history.pushState(null,'','?room='+roomId);
  subscribeRoom();
}

function subscribeRoom(){
  renderWaiting();
  roomListener=roomRef.on('value',snap=>{
    if(!snap.exists())return;
    roomData=snap.val();
    handleUpdate(roomData);
  });
}

function handleUpdate(d){
  if(!d)return;
  if(d.players<2){renderWaiting();return;}
  if(d.q>=TOTAL){renderFinal(d);return;}
  const myAns=d[myRole];
  const partnerAns=d[myRole==='host'?'guest':'host'];
  const both=(myAns!=null&&partnerAns!=null);
  if(both){renderComparison(d);}
  else{renderQuestion(d);}
}

function renderHome(){
  box.innerHTML=`
    <div class="g-card">
      <span class="g-card-emoji">💝</span>
      <div class="g-card-title">กำลังสร้างห้อง...</div>
      <div class="g-card-desc">รอแป๊บนึงนะ 🌸</div>
    </div>
    <div class="waiting-dots"><span></span><span></span><span></span></div>`;
}

function renderWaiting(){
  box.innerHTML=`
    <div class="g-card">
      <span class="g-card-emoji">💌</span>
      <div class="g-card-title">ส่ง Link ให้แฟนก่อนนะ!</div>
      <div class="g-card-desc">แฟนเปิด link แล้วเกมจะเริ่มอัตโนมัติเลย 🎮</div>
      <button class="btn-primary" onclick="shareRoomLink()">📤 ส่ง Link ให้แฟน</button>
    </div>
    <div class="waiting-dots"><span></span><span></span><span></span></div>`;
}

function shareRoomLink(){
  const url=location.origin+location.pathname.replace(/[?#].*/,'')+'?room='+roomId;
  if(navigator.share){navigator.share({title:'Love Quiz 💝',text:'มาทำ Love Quiz ด้วยกัน!',url});}
  else{navigator.clipboard.writeText(url).then(()=>showToast('คัดลอก link แล้ว! ส่งให้แฟนได้เลย 💕')).catch(()=>prompt('Copy link:',url));}
}

function renderQuestion(d){
  const q=questions[d.q];
  const myAns=d[myRole];
  const pct=(d.q/TOTAL)*100;
  const partnerAns=d[myRole==='host'?'guest':'host'];
  let choicesHtml='';
  if(myAns==null){
    q.choices.forEach((c,i)=>{
      choicesHtml+=`<button class="choice-btn" onclick="pick(${i})">${c}</button>`;
    });
  } else {
    const insight=q;
    choicesHtml=`
      <div style="margin-top:4px">
        ${q.choices.map((c,i)=>`<button class="choice-btn ${i===myAns?'selected':''}" disabled>${c}</button>`).join('')}
      </div>
      <div class="insight-card">
        <div class="insight-emoji">${insight.insightEmojis[myAns]}</div>
        <div class="insight-title">${insight.insightTitles[myAns]}</div>
        <div class="insight-text">${insight.insights[myAns]}</div>
      </div>
      <div class="waiting-partner">${partnerAns!=null?'แฟนตอบแล้ว! กำลังแสดงผล...':'⏳ รอแฟนตอบ...'}</div>`;
  }
  box.innerHTML=`
    <div class="progress-wrap">
      <div class="progress-bar-bg"><div class="progress-bar" style="width:${pct}%"></div></div>
      <div class="progress-label">ข้อ ${d.q+1} / ${TOTAL}</div>
    </div>
    <div class="question-card">
      <div class="q-number">ข้อที่ ${d.q+1} / ${TOTAL}</div>
      <span class="q-emoji">${q.emoji}</span>
      <div class="q-text">${q.q}</div>
      <div class="choices">${choicesHtml}</div>
    </div>`;
}

async function pick(choiceIdx){
  await roomRef.update({[myRole]:choiceIdx});
}

function renderComparison(d){
  const q=questions[d.q];
  const myAns=d[myRole];
  const partnerAns=d[myRole==='host'?'guest':'host'];
  const isMatch=myAns===partnerAns;
  if(isMatch)launchConfetti();
  const isLast=d.q>=TOTAL-1;
  const pct=((d.q+1)/TOTAL)*100;
  box.innerHTML=`
    <div class="progress-wrap">
      <div class="progress-bar-bg"><div class="progress-bar" style="width:${pct}%"></div></div>
      <div class="progress-label">ข้อ ${d.q+1} / ${TOTAL}</div>
    </div>
    <div class="result-card">
      <div class="result-big-emoji">${isMatch?'💖':'💥'}</div>
      <div class="result-title">${isMatch?'Match! คิดเหมือนกัน! 🥰':'ไม่ตรงกัน! 😄'}</div>
      <div class="result-q-text">${q.q}</div>
      <div class="compare-grid">
        <div class="compare-side">
          <div class="compare-who">คุณ 👤</div>
          <div class="compare-choice-text choice-me">${q.choices[myAns]}</div>
          <div class="compare-insight-title">${q.insightTitles[myAns]}</div>
          <div class="compare-insight-text">${q.insights[myAns]}</div>
        </div>
        <div class="compare-side">
          <div class="compare-who">แฟน 💕</div>
          <div class="compare-choice-text choice-partner">${q.choices[partnerAns]}</div>
          <div class="compare-insight-title">${q.insightTitles[partnerAns]}</div>
          <div class="compare-insight-text">${q.insights[partnerAns]}</div>
        </div>
      </div>
    </div>
    <button class="btn-primary" id="nextBtn" onclick="nextQ()">${isLast?'🎉 ดูผลสรุป!':'▶ ข้อต่อไป'}</button>`;
}

async function nextQ(){
  if(advancing)return;
  advancing=true;
  document.getElementById('nextBtn')?.setAttribute('disabled','');
  const d=roomData;
  if(!d){advancing=false;return;}
  await roomRef.update({
    ['history/'+d.q]:{host:d.host,guest:d.guest},
    q:d.q+1,host:null,guest:null,
  });
  advancing=false;
}

function renderFinal(d){
  const hist=d.history||{};
  let matchCount=0,items='';
  questions.forEach((q,i)=>{
    const h=hist[i]||{};
    const myAns=myRole==='host'?h.host:h.guest;
    const partnerAns=myRole==='host'?h.guest:h.host;
    const isMatch=myAns!=null&&partnerAns!=null&&myAns===partnerAns;
    if(isMatch)matchCount++;
    items+=`
      <div class="compare-item ${isMatch?'match':'nomatch'}">
        <div class="compare-q">${q.q}</div>
        <div class="compare-answers">
          ${isMatch
            ?`<span class="compare-badge badge-match">💖 Match! — ${q.insightTitles[myAns]}</span>`
            :`<span class="compare-badge badge-me">คุณ: ${myAns!=null?q.insightTitles[myAns]:'?'}</span>
              <span class="compare-badge badge-partner">แฟน: ${partnerAns!=null?q.insightTitles[partnerAns]:'?'}</span>`
          }
        </div>
      </div>`;
  });
  const msg=matchMessages.find(m=>matchCount>=m.min&&matchCount<=m.max)||matchMessages[matchMessages.length-1];
  if(matchCount>=7)setTimeout(launchConfetti,100);
  box.innerHTML=`
    <div class="score-card">
      <div class="score-big">${matchCount}/${TOTAL}</div>
      <div class="score-label">ตรงกัน</div>
      <div class="score-msg">${msg.msg}</div>
      <div class="score-sub">${msg.sub}</div>
    </div>
    <div class="compare-list">${items}</div>
    <button class="btn-primary" onclick="restartGame()">🔄 เล่นใหม่</button>`;
  setTimeout(()=>roomRef&&roomRef.remove(),5000);
}

async function restartGame(){
  if(!roomRef){renderHome();return;}
  advancing=false;
  await roomRef.set({q:0,players:2,host:null,guest:null,history:{}});
}

function goBack(){
  if(roomListener&&roomRef)roomRef.off('value',roomListener);
  location.href='index.html';
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function launchConfetti(){
  const c=document.getElementById('confetti');
  const colors=['#06d6a0','#4cc9f0','#c77dff','#ff6b9d','#ffd60a'];
  c.innerHTML='';
  for(let i=0;i<60;i++){
    const p=document.createElement('div');p.className='confetti-piece';
    p.style.cssText=`left:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1+Math.random()*1.5}s;animation-delay:${Math.random()*.3}s;`;
    c.appendChild(p);
  }
  setTimeout(()=>c.innerHTML='',3000);
}

const params=new URLSearchParams(location.search);
const roomParam=params.get('room');
const roleParam=params.get('r');
if(roomParam){
  roomId=roomParam.toUpperCase();
  if(roleParam==='h'){myRole='host';roomRef=db.ref('quiz/'+roomId);subscribeRoom();}
  else{doJoinGuest(roomId);}
} else {
  renderHome();
  createRoom();
}
</script>
</body>
</html>
