<html lang="th">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💝 Love Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700;900&family=Mitr:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Kanit',sans-serif;background:linear-gradient(135deg,#ffe0f0 0%,#e8d5ff 30%,#d0f0ff 60%,#ffd6e0 100%);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:30px 20px 40px;overflow-x:hidden;}
body::before{content:'💝 🌸 ✨ 💡 💖 🌟 🧠 💗';position:fixed;top:-20px;left:0;width:100%;font-size:22px;letter-spacing:35px;animation:floatDown 14s linear infinite;opacity:0.2;z-index:0;white-space:nowrap;pointer-events:none;}

.subtitle{font-size:0.95rem;color:#06d6a0;margin-top:6px;font-family:'Mitr',sans-serif;}

.progress-wrap{margin-bottom:16px;}
.progress-bar-bg{background:rgba(255,255,255,0.6);border-radius:10px;height:8px;overflow:hidden;}
.progress-bar{background:linear-gradient(90deg,#06d6a0,#4cc9f0);height:100%;border-radius:10px;transition:width 0.4s ease;}
.progress-label{font-size:0.8rem;font-family:'Mitr',sans-serif;color:#aaa;text-align:right;margin-top:5px;}
.question-card{background:white;border-radius:24px;padding:26px 22px;margin-bottom:16px;box-shadow:0 12px 40px rgba(6,214,160,0.15),0 0 0 3px white;animation:cardFloat 3s ease-in-out infinite;}

.q-number{font-size:0.7rem;font-family:'Mitr',sans-serif;color:#06d6a0;font-weight:700;letter-spacing:2px;margin-bottom:10px;text-transform:uppercase;}
.q-emoji{font-size:2.5rem;display:block;margin-bottom:12px;}
.q-text{font-size:clamp(1rem,3.8vw,1.25rem);font-weight:700;color:#333;line-height:1.4;}
.choices{display:flex;flex-direction:column;gap:10px;margin-top:18px;}
.choice-btn{padding:15px 18px;border-radius:16px;border:2.5px solid #e0f7f1;background:#f7fffe;font-family:'Kanit',sans-serif;font-size:0.95rem;font-weight:600;color:#333;cursor:pointer;transition:all 0.2s;text-align:left;line-height:1.3;}

.choice-btn.selected{border-color:#06d6a0;background:#06d6a0;color:white;}
.choice-btn.correct{border-color:#06d6a0;background:#edfff8;color:#06d6a0;}
.choice-btn.wrong{border-color:#ff6b6b;background:#fff0f0;color:#ff6b6b;}
.insight-card{display:none;background:linear-gradient(135deg,#edfff8,#eafaff);border-radius:20px;padding:20px;margin-top:14px;border:2px solid #06d6a0;}
.insight-emoji{font-size:2rem;margin-bottom:8px;}
.insight-title{font-size:1rem;font-weight:700;color:#06d6a0;margin-bottom:4px;}
.insight-text{font-size:0.88rem;font-family:'Mitr',sans-serif;color:#555;line-height:1.5;}
.score-card{display:none;background:white;border-radius:24px;padding:30px 22px;margin-bottom:16px;box-shadow:0 12px 40px rgba(6,214,160,0.2);text-align:center;}
.score-big{font-size:3.5rem;font-weight:900;background:linear-gradient(135deg,#06d6a0,#4cc9f0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.score-label{font-size:1rem;color:#aaa;font-family:'Mitr',sans-serif;margin-top:4px;}
.score-msg{font-size:1.1rem;font-weight:700;color:#333;margin-top:14px;line-height:1.4;}
.score-sub{font-size:0.85rem;color:#aaa;font-family:'Mitr',sans-serif;margin-top:6px;}
.btn-next{width:100%;padding:17px;border:none;border-radius:18px;font-family:'Kanit',sans-serif;font-size:1.2rem;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#06d6a0,#4cc9f0);color:white;box-shadow:0 10px 30px rgba(6,214,160,0.35);transition:all 0.2s;margin-bottom:10px;}

.btn-restart{width:100%;padding:14px;border:2.5px solid #06d6a0;border-radius:18px;font-family:'Kanit',sans-serif;font-size:1rem;font-weight:600;cursor:pointer;background:white;color:#06d6a0;transition:all 0.2s;margin-bottom:10px;}
.btn-restart:hover{background:#edfff8;transform:translateY(-2px);}
.btn-share{width:100%;padding:14px;border:2.5px solid #4cc9f0;border-radius:18px;font-family:'Kanit',sans-serif;font-size:1rem;font-weight:600;cursor:pointer;background:white;color:#4cc9f0;transition:all 0.2s;margin-bottom:10px;}
.btn-share:hover{background:#eafaff;transform:translateY(-2px);}

.start-desc{font-size:0.88rem;font-family:'Mitr',sans-serif;color:#aaa;line-height:1.5;}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:#333;color:white;padding:12px 24px;border-radius:30px;font-family:'Mitr',sans-serif;font-size:0.9rem;opacity:0;transition:all 0.3s;z-index:200;pointer-events:none;white-space:nowrap;}

.confetti-container{position:fixed;inset:0;pointer-events:none;z-index:100;overflow:hidden;}
.confetti-piece{position:absolute;animation:confettiFall 1.5s ease-in forwards;}

</style>
</head>
<body>
<div class="confetti-container" id="confetti"></div>

<div class="title-area">
  <h1>💝 Love Quiz</h1>

  </div>

    <span class="q-emoji" id="qEmoji"></span>
    <div class="q-text" id="qText"></div>
    <div class="choices" id="choicesBox"></div>
    <div class="insight-card" id="insightCard">

      <div class="insight-title" id="insightTitle"></div>
      <div class="insight-text" id="insightText"></div>
    </div>
  </div>

  <div class="score-card" id="scoreCard">
    <div class="score-big" id="scoreBig"></div>
    <div class="score-label">คะแนนของคุณ</div>
    <div class="score-msg" id="scoreMsg"></div>
    <div class="score-sub" id="scoreSub"></div>
  </div>

  <button class="btn-next" id="btnAction" onclick="handleAction()">💝 เริ่ม Quiz เลย!</button>
  <button class="btn-share" onclick="shareLink()" id="btnShare" style="display:none">📤 Share ให้แฟนทำด้วย</button>
  <button class="btn-restart" onclick="restart()" id="btnRestart" style="display:none">🔄 เริ่มใหม่</button>
  <button class="btn-back" onclick="location.href='index.html'">← หน้าหลัก</button>

</div>

const scoreMessages=[
  {min:0,max:3,msg:'คุณเพิ่งเริ่มเรียนรู้ตัวเอง 🌱',sub:'ลองคุยกับแฟนเกี่ยวกับคำตอบของคุณ อาจได้เรียนรู้อะไรใหม่ๆ!'},
  {min:4,max:6,msg:'คุณรู้จักตัวเองดีพอสมควร 💫',sub:'ความสัมพันธ์ของคุณมีพื้นฐานที่ดี ลองแชร์ quiz นี้ให้แฟนทำด้วย!'},
  {min:7,max:9,msg:'คุณเข้าใจตัวเองและความรักได้ดีมาก 💖',sub:'แชร์ผลให้แฟนดู แล้วคุยกันว่าคำตอบต่างกันไหม มันจะสนุกมาก!'},
  {min:10,max:10,msg:'Love Expert! คุณเข้าใจความรักลึกมาก ✨',sub:'คุณคือ relationship goals! แฟนโชคดีมากที่มีคุณอยู่ด้วย 💕'},
];

let currentQ=0;
let score=0;
let answered=[];
let started=false;
let lastChoice=null;

function handleAction(){
  if(!started){
    started=true;
    document.getElementById('startCard').style.display='none';
    document.getElementById('progressWrap').style.display='block';
    document.getElementById('questionCard').style.display='block';
    document.getElementById('btnAction').textContent='▶ ถัดไป';
    document.getElementById('btnAction').disabled=true;
    document.getElementById('btnAction').style.opacity='0.4';
    showQuestion(0);
    return;
  }
  if(lastChoice===null)return;
  currentQ++;
  score++;
  if(currentQ>=questions.length){showScore();return;}
  showQuestion(currentQ);
}

function showQuestion(idx){
  const q=questions[idx];
  document.getElementById('qNumber').textContent='คำถามที่ '+(idx+1)+' / '+questions.length;
  document.getElementById('qEmoji').textContent=q.emoji;
  document.getElementById('qText').textContent=q.q;
  const box=document.getElementById('choicesBox');
  box.innerHTML='';
  q.choices.forEach((c,i)=>{
    const btn=document.createElement('button');
    btn.className='choice-btn';
    btn.textContent=c;
    btn.onclick=()=>selectChoice(idx,i,btn);
    box.appendChild(btn);
  });
  document.getElementById('insightCard').style.display='none';
  document.getElementById('btnAction').disabled=true;
  document.getElementById('btnAction').style.opacity='0.4';
  lastChoice=null;
  const pct=((idx)/questions.length)*100;
  document.getElementById('progressBar').style.width=pct+'%';
  document.getElementById('progressLabel').textContent=idx+' / '+questions.length+' ตอบแล้ว';
}

function selectChoice(qIdx,choiceIdx,btn){
  const q=questions[qIdx];
  document.querySelectorAll('.choice-btn').forEach(b=>b.className='choice-btn');
  btn.className='choice-btn selected';
  lastChoice=choiceIdx;
  answered[qIdx]=choiceIdx;
  const insight=document.getElementById('insightCard');
  document.getElementById('insightEmoji').textContent=q.insightEmojis[choiceIdx];
  document.getElementById('insightTitle').textContent=q.insightTitles[choiceIdx];
  document.getElementById('insightText').textContent=q.insights[choiceIdx];
  insight.style.display='block';
  document.getElementById('btnAction').disabled=false;
  document.getElementById('btnAction').style.opacity='1';
  if(currentQ===questions.length-1){
    document.getElementById('btnAction').textContent='🎉 ดูผลลัพธ์!';
  }
}

function showScore(){
  document.getElementById('questionCard').style.display='none';
  document.getElementById('progressWrap').style.display='none';
  document.getElementById('scoreCard').style.display='block';
  document.getElementById('btnAction').style.display='none';
  document.getElementById('btnShare').style.display='block';
  document.getElementById('btnRestart').style.display='block';
  document.getElementById('scoreBig').textContent=score+'/'+questions.length;
  const msg=scoreMessages.find(m=>score>=m.min&&score<=m.max)||scoreMessages[scoreMessages.length-1];
  document.getElementById('scoreMsg').textContent=msg.msg;
  document.getElementById('scoreSub').textContent=msg.sub;
  document.getElementById('progressBar').style.width='100%';
  document.getElementById('progressLabel').textContent=questions.length+' / '+questions.length+' ตอบแล้ว';
  launchConfetti();
}

function restart(){
  currentQ=0;score=0;answered=[];lastChoice=null;started=false;
  document.getElementById('startCard').style.display='block';
  document.getElementById('progressWrap').style.display='none';
  document.getElementById('questionCard').style.display='none';
  document.getElementById('scoreCard').style.display='none';
  document.getElementById('btnAction').style.display='block';
  document.getElementById('btnAction').textContent='💝 เริ่ม Quiz เลย!';
  document.getElementById('btnAction').disabled=false;
  document.getElementById('btnAction').style.opacity='1';
  document.getElementById('btnShare').style.display='none';
  document.getElementById('btnRestart').style.display='none';
  document.getElementById('progressBar').style.width='0%';
}

function shareLink(){
  const url=location.origin+location.pathname;
  if(navigator.share){navigator.share({title:'Love Quiz 💝',text:'มาทำ Love Quiz ด้วยกัน แล้วเอาผลมาเปรียบกัน!',url});}
  else{navigator.clipboard.writeText(url).then(()=>showToast('คัดลอก link แล้ว! ส่งให้แฟนได้เลย 💕')).catch(()=>showToast('Copy: '+url));}
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function launchConfetti(){
  const container=document.getElementById('confetti');
  const colors=['#06d6a0','#4cc9f0','#c77dff','#ff6b9d','#ffd60a'];
  container.innerHTML='';
  for(let i=0;i<60;i++){
    const p=document.createElement('div');p.className='confetti-piece';
    p.style.cssText=`left:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1+Math.random()*1.5}s;animation-delay:${Math.random()*.3}s;`;
    container.appendChild(p);
  }
  setTimeout(()=>container.innerHTML='',3000);
}
</script>
