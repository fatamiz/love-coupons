<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎀 Love Coupons</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700;900&family=Mitr:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--pink:#ff6b9d;--purple:#c77dff;--mint:#06d6a0;--blue:#4cc9f0;--orange:#ff9f43;--coral:#ff6b6b;--yellow:#f59e0b;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Kanit',sans-serif;background:linear-gradient(135deg,#ffe0f0 0%,#e8d5ff 30%,#d0f0ff 60%,#ffd6e0 100%);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:30px 20px;overflow-x:hidden;}
body::before{content:'💖 🌸 ✨ 💕 🌷 💝 ⭐ 🦋 💗 🌺 ✨ 💖';position:fixed;top:-20px;left:0;width:100%;font-size:22px;letter-spacing:30px;animation:floatDown 12s linear infinite;opacity:0.25;z-index:0;white-space:nowrap;pointer-events:none;}
@keyframes floatDown{0%{transform:translateY(-30px)}100%{transform:translateY(110vh)}}
.title-area{text-align:center;margin-bottom:30px;position:relative;z-index:1;}
.title-area h1{font-size:clamp(2rem,8vw,3.5rem);font-weight:900;background:linear-gradient(135deg,#ff6b9d,#c77dff,#4cc9f0,#ff6b9d);background-size:300% 300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:gradientShift 4s ease infinite;line-height:1.1;}
@keyframes gradientShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.subtitle{font-size:1rem;color:#c77dff;margin-top:6px;font-weight:500;font-family:'Mitr',sans-serif;}
.box{width:100%;max-width:480px;position:relative;z-index:1;}

/* Lobby */
.g-card{background:white;border-radius:24px;padding:28px 22px;box-shadow:0 12px 40px rgba(255,107,157,0.15);margin-bottom:14px;text-align:center;}
.g-card-emoji{font-size:3.5rem;display:block;margin-bottom:12px;}
.g-card-title{font-size:1.25rem;font-weight:900;color:#333;margin-bottom:6px;}
.g-card-desc{font-size:0.88rem;font-family:'Mitr',sans-serif;color:#aaa;line-height:1.5;margin-bottom:18px;}
.waiting-dots{display:flex;justify-content:center;gap:8px;margin-top:18px;}
.waiting-dots span{width:10px;height:10px;background:#ff6b9d;border-radius:50%;animation:bounce 1.2s infinite;}
.waiting-dots span:nth-child(2){animation-delay:0.2s;}
.waiting-dots span:nth-child(3){animation-delay:0.4s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-10px)}}
.btn-primary{width:100%;padding:16px;border:none;border-radius:18px;font-family:'Kanit',sans-serif;font-size:1.1rem;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#ff6b9d,#c77dff);color:white;box-shadow:0 10px 30px rgba(255,107,157,0.35);transition:all 0.2s;margin-bottom:10px;display:block;}
.btn-primary:hover{transform:translateY(-3px);}

/* Coupon card */
.mystery-card{background:linear-gradient(145deg,#ff6b9d,#c77dff);border-radius:24px;padding:5px;margin-bottom:24px;box-shadow:0 20px 60px rgba(255,107,157,0.4),0 0 0 3px white;animation:cardFloat 3s ease-in-out infinite;}
@keyframes cardFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.mystery-inner{background:white;border-radius:20px;overflow:hidden;min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.mystery-front{padding:40px 30px;text-align:center;width:100%;}
.mystery-emoji{font-size:5rem;animation:wiggle 1.5s ease-in-out infinite;display:block;margin-bottom:12px;}
@keyframes wiggle{0%,100%{transform:rotate(-5deg) scale(1)}50%{transform:rotate(5deg) scale(1.1)}}
.mystery-text{font-size:1.3rem;color:#c77dff;font-weight:700;}
.revealed-coupon{width:100%;display:none;flex-direction:column;}
.coupon-header{padding:20px 25px 15px;display:flex;align-items:flex-start;gap:15px;width:100%;}
.coupon-emoji-big{font-size:3.5rem;flex-shrink:0;animation:popIn 0.5s cubic-bezier(0.175,0.885,0.32,1.275);}
@keyframes popIn{0%{transform:scale(0) rotate(-20deg);opacity:0}100%{transform:scale(1) rotate(0);opacity:1}}
.coupon-label{font-size:0.65rem;font-family:'Mitr',sans-serif;letter-spacing:2px;color:#aaa;text-transform:uppercase;margin-bottom:4px;}
.coupon-title{font-size:clamp(1.4rem,5vw,2rem);font-weight:900;line-height:1.1;color:#333;}
.coupon-desc{font-size:0.85rem;color:#888;margin-top:6px;font-family:'Mitr',sans-serif;line-height:1.4;}
.coupon-footer{width:100%;border-top:2px dashed #f0f0f0;padding:12px 25px;display:flex;align-items:center;justify-content:space-between;margin-top:5px;}
.coupon-tag{font-size:0.75rem;padding:4px 12px;border-radius:20px;font-weight:600;font-family:'Mitr',sans-serif;}
.coupon-barcode{font-size:0.65rem;color:#ccc;letter-spacing:4px;font-family:monospace;}

.btn-spin{width:100%;padding:18px;border:none;border-radius:18px;font-family:'Kanit',sans-serif;font-size:1.3rem;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#ff6b9d,#c77dff);color:white;box-shadow:0 10px 30px rgba(255,107,157,0.4);transition:all 0.2s;position:relative;overflow:hidden;}
.btn-spin:hover{transform:translateY(-3px);}
.btn-spin:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.btn-outline{width:100%;padding:14px;border:2.5px solid #ff6b9d;border-radius:18px;font-family:'Kanit',sans-serif;font-size:1.1rem;font-weight:600;cursor:pointer;background:white;color:#ff6b9d;transition:all 0.2s;margin-top:12px;display:none;}
.btn-outline.show{display:block;}
.btn-outline:hover{background:#fff0f6;transform:translateY(-2px);}
.btn-row{display:flex;gap:10px;margin-top:12px;}
.btn-row .btn-secondary{flex:1;padding:14px;border:2.5px solid #c77dff;border-radius:18px;font-family:'Kanit',sans-serif;font-size:1rem;font-weight:600;cursor:pointer;background:white;color:#c77dff;transition:all 0.2s;}
.btn-row .btn-secondary:hover{background:#f5eeff;transform:translateY(-2px);}
.all-used{text-align:center;padding:20px;color:#c77dff;font-size:1rem;font-family:'Mitr',sans-serif;display:none;}
.reset-link{background:none;border:none;color:#ff6b9d;font-size:0.9rem;cursor:pointer;font-family:'Mitr',sans-serif;text-decoration:underline;margin-top:8px;display:block;}
.btn-back-main{width:100%;padding:13px;border:none;border-radius:18px;font-family:'Kanit',sans-serif;font-size:1rem;font-weight:600;cursor:pointer;background:rgba(255,255,255,0.7);color:#aaa;margin-top:10px;transition:all 0.2s;}
.btn-back-main:hover{background:rgba(255,255,255,0.9);}

.confetti-container{position:fixed;inset:0;pointer-events:none;z-index:100;overflow:hidden;}
.confetti-piece{position:absolute;animation:confettiFall 1.5s ease-in forwards;}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:#333;color:white;padding:12px 24px;border-radius:30px;font-family:'Mitr',sans-serif;font-size:0.9rem;opacity:0;transition:all 0.3s;z-index:200;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.theme-pink{color:#ff6b9d;background:#fff0f6;}
.theme-purple{color:#c77dff;background:#f5eeff;}
.theme-mint{color:#06d6a0;background:#edfff8;}
.theme-blue{color:#4cc9f0;background:#eafaff;}
.theme-orange{color:#ff9f43;background:#fff5eb;}
.theme-coral{color:#ff6b6b;background:#fff0f0;}
.theme-yellow{color:#f59e0b;background:#fffbeb;}
</style>
</head>
<body>
<div class="confetti-container" id="confetti"></div>
<div class="toast" id="toast"></div>
<div class="title-area">
  <h1>🎀 Love Coupons</h1>
  <p class="subtitle">เล่นด้วยกัน 2 เครื่อง แบบ real-time 💕</p>
</div>
<div class="box" id="box"></div>

<script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyC98_FyVY_mzW_UwJ0-xQqMqx3Qy_paSi0",
  authDomain:"love-games-a0127.firebaseapp.com",
  databaseURL:"https://love-games-a0127-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"love-games-a0127",
  storageBucket:"love-games-a0127.firebasestorage.app",
  messagingSenderId:"1078221272996",
  appId:"1:1078221272996:web:64c29179c9daa3a8837331"
});
const db=firebase.database();

const STORAGE_KEY='lovecoupons_v1';
const coupons=[
  {emoji:'🎬',title:'พาไปดูหนัง',desc:'เลือกหนังได้เลย ไม่มีบ่น! 🍿',color:'theme-coral'},
  {emoji:'🍣',title:'พาไปกินของอร่อย',desc:'เลือกร้านได้เองเลยนะ 😋',color:'theme-mint'},
  {emoji:'🫂',title:'กอดฟรี 1 ครั้ง',desc:'กอดได้นานเท่าที่อยากได้เลย 🥰',color:'theme-pink'},
  {emoji:'✈️',title:'พาไปเที่ยว',desc:'เลือกที่เที่ยวได้เลย จัดให้ทุกอย่าง 🗺️',color:'theme-blue'},
  {emoji:'🛍️',title:'ซื้อของให้ 1 ชิ้น',desc:'อยากได้อะไรก็บอก (ราคาสมเหตุสมผล 😅)',color:'theme-purple'},
  {emoji:'🥘',title:'ไปกินชาบู',desc:'เลือกร้านได้เลย สั่งเพิ่มได้ไม่จำกัด 🍲',color:'theme-orange'},
  {emoji:'💅',title:'ตามใจ 1 วัน',desc:'วันนี้อยากทำอะไรก็ได้เลย ตามใจเต็มที่ 👑',color:'theme-pink'},
  {emoji:'🔥',title:'ปิ้งย่างร้านโปรด',desc:'เลือกร้านได้เอง ชิลล์ด้วยกัน 🍖',color:'theme-coral'},
  {emoji:'💆',title:'หายงอน',desc:'ฉันหายงอนทันทีไม่มีเงื่อนไข 🕊️',color:'theme-mint'},
  {emoji:'☕',title:'ไปคาเฟ่',desc:'เลือกคาเฟ่น่ารักด้วยกัน 📸',color:'theme-yellow'},
  {emoji:'😘',title:'คูปอง Kiss',desc:'แลกได้เมื่อไหร่ก็ได้ xoxo 💋',color:'theme-pink'},
  {emoji:'🌟',title:'อยากได้อะไรขอมา',desc:'ให้ได้หมดทุกอย่างเลย (ในขอบเขต 😂)',color:'theme-purple'},
  {emoji:'🎮',title:'เล่นเกมด้วยกัน',desc:'ไม่ว่าจะเกมอะไร เล่นด้วยกันคืนนี้ 🕹️',color:'theme-blue'},
  {emoji:'🍰',title:'ทำอาหารให้กิน',desc:'เมนูอะไรก็ได้ที่อยากกิน ทำให้เลย 👨‍🍳',color:'theme-orange'},
  {emoji:'💌',title:'เป็นทาสน้อย 1 วัน',desc:'สั่งได้ทุกอย่าง ฉันทำให้หมด 🐾',color:'theme-coral'},
];
const spinEmojis=['🎁','💝','🎀','💖','🌟','✨','💕','🎊','🎉','💗'];
const themeColors={'theme-pink':'#ff6b9d','theme-purple':'#c77dff','theme-mint':'#06d6a0','theme-blue':'#4cc9f0','theme-orange':'#ff9f43','theme-coral':'#ff6b6b','theme-yellow':'#f59e0b'};

const box=document.getElementById('box');
let roomId=null,myRole=null,roomRef=null,roomListener=null,isSpinning=false;
let localState={remaining:coupons.map((_,i)=>i),history:[],current:null};

function loadLocal(){try{const s=localStorage.getItem(STORAGE_KEY);if(s)localState=JSON.parse(s);}catch(e){}}
function saveLocal(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(localState));}catch(e){}}

function genId(){
  const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({length:6},()=>c[Math.floor(Math.random()*c.length)]).join('');
}

async function createRoom(){
  loadLocal();
  roomId=genId();
  myRole='host';
  roomRef=db.ref('lc/'+roomId);
  const remaining=localState.remaining.length>0?localState.remaining:[...Array(coupons.length).keys()];
  await roomRef.set({players:1,remaining,current:null,spinning:false});
  history.pushState(null,'','?room='+roomId+'&r=h');
  subscribeRoom();
}

async function doJoinGuest(code){
  roomId=code;
  myRole='guest';
  roomRef=db.ref('lc/'+roomId);
  const snap=await roomRef.once('value');
  if(!snap.exists()){showToast('ลิงก์หมดอายุแล้ว ขอลิงก์ใหม่จากแฟนได้เลย 😅');setTimeout(()=>{window.location.href=window.location.pathname;},2500);return;}
  await roomRef.update({players:2});
  history.pushState(null,'','?room='+roomId);
  subscribeRoom();
}

function subscribeRoom(){
  renderWaiting();
  roomListener=roomRef.on('value',snap=>{
    if(!snap.exists())return;
    const d=snap.val();
    if(d.players<2){renderWaiting();return;}
    handleUpdate(d);
  });
}

function handleUpdate(d){
  if(d.spinning){renderSpinning();}
  else{renderGame(d);}
}

function renderHome(){
  box.innerHTML=`
    <div class="g-card">
      <span class="g-card-emoji">🎀</span>
      <div class="g-card-title">กำลังสร้างห้อง...</div>
      <div class="g-card-desc">รอแป๊บนึงนะ 🌸</div>
    </div>
    <div class="waiting-dots"><span></span><span></span><span></span></div>`;
}

function renderWaiting(){
  box.innerHTML=`
    <div class="g-card">
      <span class="g-card-emoji">💌</span>
      <div class="g-card-title">ส่ง Link ให้แฟนก่อนนะ!</div>
      <div class="g-card-desc">แฟนเปิด link แล้วเกมจะเริ่มอัตโนมัติเลย 🎮</div>
      <button class="btn-primary" onclick="shareRoomLink()">📤 ส่ง Link ให้แฟน</button>
    </div>
    <div class="waiting-dots"><span></span><span></span><span></span></div>`;
}

function shareRoomLink(){
  const url=location.origin+location.pathname.replace(/[?#].*/,'')+'?room='+roomId;
  if(navigator.share){navigator.share({title:'Love Coupons 🎀',text:'มาสุ่มคูปองความรักด้วยกัน!',url});}
  else{navigator.clipboard.writeText(url).then(()=>showToast('คัดลอก link แล้ว! ส่งให้แฟนได้เลย 💕')).catch(()=>prompt('Copy link:',url));}
}

function renderSpinning(){
  let i=0;
  box.innerHTML=`
    <div class="mystery-card" id="mysteryCard">
      <div class="mystery-inner">
        <div class="mystery-front">
          <span class="mystery-emoji" id="mysteryEmoji">${spinEmojis[0]}</span>
          <p class="mystery-text">กำลังสุ่มคูปอง...</p>
        </div>
      </div>
    </div>
    <button class="btn-spin" disabled>⏳ กำลังสุ่ม...</button>
    <div class="btn-row">
      <button class="btn-secondary" disabled>📤 Share</button>
      <button class="btn-secondary" onclick="location.href='history.html'">📋 ดูประวัติ</button>
    </div>
    <button class="btn-back-main" onclick="goBack()">← หน้าหลัก</button>`;
  const iv=setInterval(()=>{
    const el=document.getElementById('mysteryEmoji');
    if(el)el.textContent=spinEmojis[++i%spinEmojis.length];
    else clearInterval(iv);
  },80);
}

function renderGame(d){
  const hasRemaining=d.remaining&&d.remaining.length>0;
  const coupon=d.current!=null?coupons[d.current]:null;
  let cardHtml='';
  if(coupon){
    const cardBg=`linear-gradient(145deg,${themeColors[coupon.color]},#c77dff)`;
    cardHtml=`
      <div class="mystery-card" id="mysteryCard" style="background:${cardBg}">
        <div class="mystery-inner">
          <div class="revealed-coupon" style="display:flex;flex-direction:column">
            <div class="coupon-header">
              <div class="coupon-emoji-big">${coupon.emoji}</div>
              <div>
                <div class="coupon-label">LOVE COUPON ✨</div>
                <div class="coupon-title">${coupon.title}</div>
                <div class="coupon-desc">${coupon.desc}</div>
              </div>
            </div>
            <div class="coupon-footer">
              <span class="coupon-tag ${coupon.color}">💖 LOVE 100%</span>
              <span class="coupon-barcode">| || ||| | ||</span>
            </div>
          </div>
        </div>
      </div>`;
  } else {
    cardHtml=`
      <div class="mystery-card" id="mysteryCard">
        <div class="mystery-inner">
          <div class="mystery-front">
            <span class="mystery-emoji">🎁</span>
            <p class="mystery-text">กดสุ่มเพื่อรับคูปอง!</p>
          </div>
        </div>
      </div>`;
  }

  let bottomHtml='';
  if(!hasRemaining&&d.current==null){
    bottomHtml=`
      <div class="all-used" style="display:block">
        <div style="font-size:2rem">🎉</div>
        <div>ใช้คูปองครบแล้ว!</div>
        <div style="font-size:0.8rem;color:#aaa;margin-top:4px">คู่รักสายรักสุด~</div>
        <button class="reset-link" onclick="resetAll()">รีเซ็ตใหม่ทั้งหมด</button>
      </div>`;
  } else {
    bottomHtml=`
      <button class="btn-spin" ${!hasRemaining?'disabled':''} onclick="spinCoupon()">${hasRemaining?'🎲 สุ่มคูปอง!':'🎉 ใช้ครบแล้ว!'}</button>
      ${coupon?`<button class="btn-outline show" onclick="hideCard()">🔄 ซ่อนคูปอง</button>`:''}`;
  }

  box.innerHTML=`
    ${cardHtml}
    ${bottomHtml}
    <div class="btn-row">
      <button class="btn-secondary" onclick="shareRoomLink()">📤 Share ลิงก์</button>
      <button class="btn-secondary" onclick="location.href='history.html'">📋 ดูประวัติ</button>
    </div>
    <button class="btn-back-main" onclick="goBack()">← หน้าหลัก</button>`;
}

async function spinCoupon(){
  if(isSpinning)return;
  const snap=await roomRef.once('value');
  const d=snap.val();
  if(!d||!d.remaining||!d.remaining.length)return;
  isSpinning=true;
  await roomRef.update({spinning:true});
  const pick=Math.floor(Math.random()*d.remaining.length);
  const idx=d.remaining[pick];
  const newRemaining=d.remaining.filter((_,i)=>i!==pick);
  const now=new Date();
  const date=now.toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'numeric'});
  setTimeout(async()=>{
    await roomRef.update({spinning:false,current:idx,remaining:newRemaining});
    // Save to localStorage for history.html
    loadLocal();
    localState.remaining=newRemaining;
    localState.current=idx;
    localState.history.push({idx,used:false,date});
    saveLocal();
    launchConfetti();
    isSpinning=false;
  },1200);
}

async function hideCard(){
  await roomRef.update({current:null});
}

async function resetAll(){
  if(!confirm('รีเซ็ตทั้งหมด? จะเริ่มใหม่ตั้งแต่ต้น 🥺'))return;
  const allIdx=[...Array(coupons.length).keys()];
  await roomRef.update({remaining:allIdx,current:null,spinning:false});
  loadLocal();
  localState={remaining:allIdx,history:[],current:null};
  saveLocal();
}

function goBack(){
  if(roomListener&&roomRef)roomRef.off('value',roomListener);
  location.href='index.html';
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function launchConfetti(){
  const c=document.getElementById('confetti');
  const colors=['#ff6b9d','#c77dff','#4cc9f0','#ffd60a','#06d6a0','#ff9f43','#ff6b6b'];
  c.innerHTML='';
  for(let i=0;i<60;i++){
    const p=document.createElement('div');p.className='confetti-piece';
    p.style.cssText=`left:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};width:${6+Math.random()*10}px;height:${6+Math.random()*10}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1+Math.random()*1.5}s;animation-delay:${Math.random()*.4}s;`;
    c.appendChild(p);
  }
  setTimeout(()=>c.innerHTML='',3000);
}

const params=new URLSearchParams(location.search);
const roomParam=params.get('room');
const roleParam=params.get('r');
if(roomParam){
  roomId=roomParam.toUpperCase();
  if(roleParam==='h'){myRole='host';roomRef=db.ref('lc/'+roomId);subscribeRoom();}
  else{doJoinGuest(roomId);}
} else {
  renderHome();
  createRoom();
}
