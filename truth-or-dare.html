<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💣 Truth or Dare</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700;900&family=Mitr:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Kanit',sans-serif;background:linear-gradient(135deg,#ffe0f0 0%,#e8d5ff 30%,#d0f0ff 60%,#ffd6e0 100%);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:30px 20px 40px;overflow-x:hidden;}
body::before{content:'💣 ✨ 💕 🎭 💖 🌟 🎀 💗';position:fixed;top:-20px;left:0;width:100%;font-size:22px;letter-spacing:35px;animation:floatDown 14s linear infinite;opacity:0.2;z-index:0;white-space:nowrap;pointer-events:none;}
@keyframes floatDown{0%{transform:translateY(-30px)}100%{transform:translateY(110vh)}}
.title-area{text-align:center;margin-bottom:24px;position:relative;z-index:1;}
.title-area h1{font-size:clamp(2rem,8vw,3rem);font-weight:900;background:linear-gradient(135deg,#c77dff,#ff6b9d,#4cc9f0);background-size:300% 300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:gradientShift 4s ease infinite;}
@keyframes gradientShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.subtitle{font-size:0.95rem;color:#c77dff;margin-top:6px;font-family:'Mitr',sans-serif;}
.box{width:100%;max-width:480px;position:relative;z-index:1;}
.card-wrap{border-radius:28px;padding:5px;margin-bottom:22px;box-shadow:0 20px 60px rgba(199,125,255,0.35),0 0 0 3px white;animation:cardFloat 3s ease-in-out infinite;}
.card-wrap.type-truth{background:linear-gradient(145deg,#c77dff,#4cc9f0);}
.card-wrap.type-dare{background:linear-gradient(145deg,#ff6b9d,#ff9f43);}
.card-wrap.type-idle{background:linear-gradient(145deg,#c77dff,#ff6b9d);}
@keyframes cardFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.card-inner{background:white;border-radius:24px;min-height:220px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:36px 28px;text-align:center;}
.card-badge{font-size:0.75rem;font-family:'Mitr',sans-serif;letter-spacing:3px;font-weight:700;text-transform:uppercase;padding:5px 16px;border-radius:20px;margin-bottom:16px;}
.badge-truth{background:#f5eeff;color:#c77dff;}
.badge-dare{background:#fff0f6;color:#ff6b9d;}
.card-big-emoji{font-size:4.5rem;margin-bottom:14px;display:block;}
@keyframes popIn{0%{transform:scale(0) rotate(-15deg);opacity:0}100%{transform:scale(1) rotate(0);opacity:1}}
.card-idle-text{font-size:1.2rem;color:#ccc;font-family:'Mitr',sans-serif;}
.card-question{font-size:clamp(1.2rem,4.5vw,1.6rem);font-weight:700;color:#333;line-height:1.4;}
@keyframes spinFast{0%{transform:rotate(0deg) scale(1.1)}100%{transform:rotate(360deg) scale(1.1)}}
.spin-anim{animation:spinFast 0.12s linear infinite!important;}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.btn-truth{padding:17px;border:none;border-radius:18px;font-family:'Kanit',sans-serif;font-size:1.1rem;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#c77dff,#4cc9f0);color:white;box-shadow:0 8px 25px rgba(199,125,255,0.4);transition:all 0.2s;}
.btn-truth:hover{transform:translateY(-3px);}
.btn-truth:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.btn-dare{padding:17px;border:none;border-radius:18px;font-family:'Kanit',sans-serif;font-size:1.1rem;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#ff6b9d,#ff9f43);color:white;box-shadow:0 8px 25px rgba(255,107,157,0.4);transition:all 0.2s;}
.btn-dare:hover{transform:translateY(-3px);}
.btn-dare:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.btn-random{width:100%;padding:17px;border:none;border-radius:18px;font-family:'Kanit',sans-serif;font-size:1.2rem;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#ff6b9d,#c77dff,#4cc9f0);background-size:200% 200%;color:white;box-shadow:0 10px 30px rgba(199,125,255,0.35);transition:all 0.2s;margin-bottom:12px;animation:gradientShift 3s ease infinite;}
.btn-random:hover{transform:translateY(-3px);}
.btn-random:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.g-card{background:white;border-radius:24px;padding:28px 22px;box-shadow:0 12px 40px rgba(199,125,255,0.15);margin-bottom:14px;text-align:center;}
.g-card-emoji{font-size:3.5rem;display:block;margin-bottom:12px;}
.g-card-title{font-size:1.25rem;font-weight:900;color:#333;margin-bottom:6px;}
.g-card-desc{font-size:0.88rem;font-family:'Mitr',sans-serif;color:#aaa;line-height:1.5;margin-bottom:18px;}
.waiting-dots{display:flex;justify-content:center;gap:8px;margin-top:18px;}
.waiting-dots span{width:10px;height:10px;background:#c77dff;border-radius:50%;animation:bounce 1.2s infinite;}
.waiting-dots span:nth-child(2){animation-delay:0.2s;}
.waiting-dots span:nth-child(3){animation-delay:0.4s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-10px)}}
.btn-primary{width:100%;padding:16px;border:none;border-radius:18px;font-family:'Kanit',sans-serif;font-size:1.1rem;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#c77dff,#ff6b9d);color:white;box-shadow:0 10px 30px rgba(199,125,255,0.35);transition:all 0.2s;margin-bottom:10px;display:block;}
.btn-primary:hover{transform:translateY(-3px);}
.btn-back{width:100%;max-width:480px;padding:13px;border:none;border-radius:18px;font-family:'Kanit',sans-serif;font-size:1rem;font-weight:600;cursor:pointer;background:rgba(255,255,255,0.7);color:#aaa;margin-top:10px;transition:all 0.2s;position:relative;z-index:1;}
.btn-back:hover{background:rgba(255,255,255,0.9);}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:#333;color:white;padding:12px 24px;border-radius:30px;font-family:'Mitr',sans-serif;font-size:0.9rem;opacity:0;transition:all 0.3s;z-index:200;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.confetti-container{position:fixed;inset:0;pointer-events:none;z-index:100;overflow:hidden;}
.confetti-piece{position:absolute;animation:confettiFall 1.5s ease-in forwards;}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>
<div class="confetti-container" id="confetti"></div>
<div class="toast" id="toast"></div>
<div class="title-area">
  <h1>💣 Truth or Dare</h1>
  <p class="subtitle">เล่นด้วยกัน 2 เครื่อง แบบ real-time ⚡</p>
</div>
<div class="box" id="box"></div>
<button class="btn-back" onclick="goBack()">← หน้าหลัก</button>

<script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyC98_FyVY_mzW_UwJ0-xQqMqx3Qy_paSi0",
  authDomain:"love-games-a0127.firebaseapp.com",
  databaseURL:"https://love-games-a0127-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"love-games-a0127",
  storageBucket:"love-games-a0127.firebasestorage.app",
  messagingSenderId:"1078221272996",
  appId:"1:1078221272996:web:64c29179c9daa3a8837331"
});
const db=firebase.database();

const truths=[
  'ความทรงจำที่ประทับใจที่สุดของเราสองคนคืออะไร?',
  'อะไรคือสิ่งแรกที่ทำให้ชอบเราตอนแรกพบกัน?',
  'เคยแอบอิจฉาอะไรเกี่ยวกับฉันบ้างไหม?',
  'ถ้าต้องอธิบายฉันด้วยคำ 3 คำ จะเลือกคำไหน?',
  'สิ่งที่ทำให้ยิ้มทุกครั้งที่นึกถึงฉันคืออะไร?',
  'เคยร้องไห้เพราะฉันไหม? เพราะอะไร?',
  'ถ้าวันนี้เป็นวันสุดท้าย จะบอกอะไรกับฉัน?',
  'นิสัยแย่ๆ ของฉันที่พยายามอดทนมากที่สุดคืออะไร?',
  'ช่วงเวลาไหนที่รู้สึกรักฉันมากที่สุด?',
  'ฝันว่าอนาคตของเราสองคนจะเป็นยังไง?',
  'มีอะไรอยากบอกฉันมานานแล้วแต่ยังไม่ได้บอกไหม?',
  'ถ้าให้ rate ความน่ารักของฉัน 1-10 ได้เท่าไหร่? (ตอบตรงๆ นะ 😂)',
  'เคยโกรธฉันโดยที่ไม่ได้บอกบ้างไหม? เรื่องอะไร?',
  'สิ่งที่ชอบมากที่สุดในตัวฉันคืออะไร?',
  'date แบบไหนที่อยากไปด้วยกันมากที่สุดตอนนี้?',
];
const dares=[
  'ร้องเพลงรักให้ฉันฟัง 1 ท่อน 🎤',
  'ส่งข้อความรักหวานๆ ให้ฉัน 1 ข้อความตอนนี้เลย 💌',
  'กอดฉันนานที่สุดเท่าที่จะทำได้ 🫂',
  'บอกสิ่งที่ชอบในตัวฉัน 5 อย่างภายใน 30 วินาที ⏱️',
  'ทำท่าน่ารักที่สุดให้ดู แล้วถ่ายรูปด้วยกัน 📸',
  'โทรหาหรือส่งข้อความถึงคนในครอบครัวบอกว่าฉันดีแค่ไหน 😂',
  'เต้นให้ฉันดูโดยไม่มีเพลง 🕺',
  'เลียนแบบฉันให้ดู (พูด ท่าทาง หรืออะไรก็ได้ 😆)',
  'ทำอาหารหรือขนมอะไรก็ได้ให้ฉันกิน 🍳',
  'เขียนชื่อฉันบนมือตัวเองด้วยปากกา 💕',
  'ส่งรูปที่ชอบที่สุดของเราสองคนให้ฉันดู 🖼️',
  'บอกความลับเล็กๆ น้อยๆ ที่ฉันไม่รู้ 🤫',
  'ทำหน้าน่ารักที่สุดให้ดู ถ่ายรูปไว้เป็นที่ระลึก 🥺',
  'พูดว่า "ที่รัก ฉันรักนายมาก" ด้วยน้ำเสียงซีเรียสที่สุด 🥰',
  'วาดรูปฉันให้ดู (ไม่ต้องสวยก็ได้ 😂) แล้วส่งให้ดู 🎨',
];

const box=document.getElementById('box');
let roomId=null,myRole=null,roomRef=null,roomListener=null,isSpinning=false,prevCardKey=null;

function genId(){
  const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({length:6},()=>c[Math.floor(Math.random()*c.length)]).join('');
}

async function createRoom(){
  roomId=genId();
  myRole='host';
  roomRef=db.ref('tod/'+roomId);
  await roomRef.set({players:1,card:null});
  roomRef.onDisconnect().remove();
  history.pushState(null,'','?room='+roomId+'&r=h');
  subscribeRoom();
}

async function doJoinGuest(code){
  roomId=code;
  myRole='guest';
  roomRef=db.ref('tod/'+roomId);
  const snap=await roomRef.once('value');
  if(!snap.exists()){showToast('ไม่พบห้องนี้ 🙈');renderHome();createRoom();return;}
  await roomRef.update({players:2});
  history.pushState(null,'','?room='+roomId);
  subscribeRoom();
}

function subscribeRoom(){
  renderWaiting();
  roomListener=roomRef.on('value',snap=>{
    if(!snap.exists())return;
    const d=snap.val();
    if(d.players<2){renderWaiting();return;}
    handleUpdate(d);
  });
}

function handleUpdate(d){
  if(d.card==='spinning'){
    renderSpinning();
  } else if(!d.card){
    renderGame(null);
    prevCardKey=null;
  } else {
    const key=d.card.type+d.card.idx;
    renderGame(d.card);
    if(prevCardKey!==key){launchConfetti();}
    prevCardKey=key;
    isSpinning=false;
  }
}

function renderHome(){
  box.innerHTML=`
    <div class="g-card">
      <span class="g-card-emoji">💣</span>
      <div class="g-card-title">กำลังสร้างห้อง...</div>
      <div class="g-card-desc">รอแป๊บนึงนะ 🌸</div>
    </div>
    <div class="waiting-dots"><span></span><span></span><span></span></div>`;
}

function renderWaiting(){
  box.innerHTML=`
    <div class="g-card">
      <span class="g-card-emoji">💌</span>
      <div class="g-card-title">ส่ง Link ให้แฟนก่อนนะ!</div>
      <div class="g-card-desc">แฟนเปิด link แล้วเกมจะเริ่มอัตโนมัติเลย 🎮</div>
      <button class="btn-primary" onclick="shareRoomLink()">📤 ส่ง Link ให้แฟน</button>
    </div>
    <div class="waiting-dots"><span></span><span></span><span></span></div>`;
}

function shareRoomLink(){
  const url=location.origin+location.pathname.replace(/[?#].*/,'')+'?room='+roomId;
  if(navigator.share){navigator.share({title:'Truth or Dare 💣',text:'มาเล่น Truth or Dare ด้วยกัน!',url});}
  else{navigator.clipboard.writeText(url).then(()=>showToast('คัดลอก link แล้ว! ส่งให้แฟนได้เลย 💕')).catch(()=>prompt('Copy link:',url));}
}

function renderSpinning(){
  const emojis=['🎲','💣','🔮','🔥','✨'];
  let i=0;
  box.innerHTML=`
    <div class="card-wrap type-idle">
      <div class="card-inner">
        <span class="card-big-emoji spin-anim" id="spinEmoji">${emojis[0]}</span>
        <p class="card-idle-text">กำลังสุ่ม...</p>
      </div>
    </div>
    <button class="btn-random" disabled>⏳ กำลังสุ่ม...</button>
    <div class="btn-row">
      <button class="btn-truth" disabled>🔮 Truth</button>
      <button class="btn-dare" disabled>🔥 Dare</button>
    </div>`;
  const iv=setInterval(()=>{
    const el=document.getElementById('spinEmoji');
    if(el)el.textContent=emojis[++i%emojis.length];
    else clearInterval(iv);
  },100);
}

function renderGame(card){
  let cardHtml='';
  if(!card){
    cardHtml=`
      <div class="card-wrap type-idle">
        <div class="card-inner">
          <span class="card-big-emoji">🎲</span>
          <p class="card-idle-text">เลือก Truth หรือ Dare<br>แล้วกดสุ่มได้เลย!</p>
        </div>
      </div>`;
  } else {
    const pool=card.type==='truth'?truths:dares;
    const emoji=card.type==='truth'?'🔮':'🔥';
    const badgeClass=card.type==='truth'?'badge-truth':'badge-dare';
    const label=card.type==='truth'?'✨ TRUTH':'🔥 DARE';
    cardHtml=`
      <div class="card-wrap type-${card.type}">
        <div class="card-inner">
          <span class="card-badge ${badgeClass}">${label}</span>
          <span class="card-big-emoji" style="animation:popIn 0.5s cubic-bezier(0.175,0.885,0.32,1.275)">${emoji}</span>
          <p class="card-question">${pool[card.idx]}</p>
        </div>
      </div>`;
  }
  box.innerHTML=`
    ${cardHtml}
    <button class="btn-random" onclick="spin('random')">🎲 สุ่มเลย! (Truth หรือ Dare)</button>
    <div class="btn-row">
      <button class="btn-truth" onclick="spin('truth')">🔮 สุ่ม Truth</button>
      <button class="btn-dare" onclick="spin('dare')">🔥 สุ่ม Dare</button>
    </div>`;
}

async function spin(type){
  if(isSpinning)return;
  isSpinning=true;
  await roomRef.update({card:'spinning'});
  const resolvedType=type==='random'?(Math.random()>0.5?'truth':'dare'):type;
  const pool=resolvedType==='truth'?truths:dares;
  const idx=Math.floor(Math.random()*pool.length);
  setTimeout(()=>roomRef.update({card:{type:resolvedType,idx}}),1100);
}

function goBack(){
  if(roomListener&&roomRef)roomRef.off('value',roomListener);
  location.href='index.html';
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function launchConfetti(){
  const c=document.getElementById('confetti');
  const colors=['#ff6b9d','#c77dff','#4cc9f0','#ffd60a','#06d6a0'];
  c.innerHTML='';
  for(let i=0;i<50;i++){
    const p=document.createElement('div');p.className='confetti-piece';
    p.style.cssText=`left:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1+Math.random()*1.5}s;animation-delay:${Math.random()*.3}s;`;
    c.appendChild(p);
  }
  setTimeout(()=>c.innerHTML='',3000);
}

const params=new URLSearchParams(location.search);
const roomParam=params.get('room');
const roleParam=params.get('r');
if(roomParam){
  roomId=roomParam.toUpperCase();
  if(roleParam==='h'){myRole='host';roomRef=db.ref('tod/'+roomId);subscribeRoom();}
  else{doJoinGuest(roomId);}
} else {
  renderHome();
  createRoom();
}
</script>
</body>
</html>
